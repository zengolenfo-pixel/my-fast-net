name: Mega Website App Builder - Android iOS Windows Linux

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Choose target: android-debug, android-release, windows, linux, ios, desktop-all, all"
        required: true
        default: "android-debug"
        type: choice
        options:
          - android-debug
          - android-release
          - windows
          - linux
          - ios
          - desktop-all
          - all

      website_url:
        description: "Website URL, example: https://example.com"
        required: true
        default: "https://example.com"

      app_name:
        description: "App display name"
        required: true
        default: "My Website App"

      app_id:
        description: "App/package ID, example: com.yourname.app"
        required: true
        default: "com.example.app"

      version_name:
        description: "Version name"
        required: true
        default: "1.0.0"

      version_code:
        description: "Android version code number"
        required: true
        default: "1"

      icon_url:
        description: "Optional icon PNG/JPG URL. Leave empty for generated icon."
        required: false
        default: ""

      splash_text:
        description: "Loading/splash text"
        required: true
        default: "Loading..."

      app_color:
        description: "Main app color HEX"
        required: true
        default: "#111827"

      status_bar_color:
        description: "Android status bar color HEX"
        required: true
        default: "#000000"

      navigation_bar_color:
        description: "Android navigation bar color HEX"
        required: true
        default: "#000000"

      orientation:
        description: "Android orientation"
        required: true
        default: "portrait"
        type: choice
        options:
          - portrait
          - landscape
          - unspecified

      android_build_mode:
        description: "Android output mode"
        required: true
        default: "apk"
        type: choice
        options:
          - apk
          - aab
          - both

      fullscreen:
        description: "Fullscreen app true/false"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      allow_http:
        description: "Allow http non-https websites true/false"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_zoom:
        description: "Enable Android WebView zoom true/false"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      cache_mode:
        description: "Website cache mode"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - no-cache
          - cache-first

      user_agent_suffix:
        description: "Extra User-Agent text"
        required: false
        default: "MegaWebsiteApp"

      desktop_width:
        description: "Desktop default width"
        required: true
        default: "1200"

      desktop_height:
        description: "Desktop default height"
        required: true
        default: "800"

      desktop_resizable:
        description: "Desktop window resizable true/false"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      desktop_fullscreen:
        description: "Desktop fullscreen true/false"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      create_release:
        description: "Create GitHub Release with files true/false"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      release_tag:
        description: "GitHub Release tag"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  actions: read

env:
  WEBSITE_URL: ${{ github.event.inputs.website_url }}
  APP_NAME: ${{ github.event.inputs.app_name }}
  APP_ID: ${{ github.event.inputs.app_id }}
  VERSION_NAME: ${{ github.event.inputs.version_name }}
  VERSION_CODE: ${{ github.event.inputs.version_code }}
  ICON_URL: ${{ github.event.inputs.icon_url }}
  SPLASH_TEXT: ${{ github.event.inputs.splash_text }}
  APP_COLOR: ${{ github.event.inputs.app_color }}
  STATUS_BAR_COLOR: ${{ github.event.inputs.status_bar_color }}
  NAVIGATION_BAR_COLOR: ${{ github.event.inputs.navigation_bar_color }}
  ORIENTATION: ${{ github.event.inputs.orientation }}
  FULLSCREEN: ${{ github.event.inputs.fullscreen }}
  ALLOW_HTTP: ${{ github.event.inputs.allow_http }}
  ENABLE_ZOOM: ${{ github.event.inputs.enable_zoom }}
  CACHE_MODE: ${{ github.event.inputs.cache_mode }}
  USER_AGENT_SUFFIX: ${{ github.event.inputs.user_agent_suffix }}
  DESKTOP_WIDTH: ${{ github.event.inputs.desktop_width }}
  DESKTOP_HEIGHT: ${{ github.event.inputs.desktop_height }}
  DESKTOP_RESIZABLE: ${{ github.event.inputs.desktop_resizable }}
  DESKTOP_FULLSCREEN: ${{ github.event.inputs.desktop_fullscreen }}

jobs:
  prepare-info:
    name: Prepare build info
    runs-on: ubuntu-latest
    outputs:
      do_android: ${{ steps.pick.outputs.do_android }}
      do_android_release: ${{ steps.pick.outputs.do_android_release }}
      do_windows: ${{ steps.pick.outputs.do_windows }}
      do_linux: ${{ steps.pick.outputs.do_linux }}
      do_ios: ${{ steps.pick.outputs.do_ios }}
    steps:
      - name: Pick targets
        id: pick
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target }}"
          DO_ANDROID=false
          DO_ANDROID_RELEASE=false
          DO_WINDOWS=false
          DO_LINUX=false
          DO_IOS=false

          if [[ "$TARGET" == "android-debug" ]]; then DO_ANDROID=true; fi
          if [[ "$TARGET" == "android-release" ]]; then DO_ANDROID=true; DO_ANDROID_RELEASE=true; fi
          if [[ "$TARGET" == "windows" ]]; then DO_WINDOWS=true; fi
          if [[ "$TARGET" == "linux" ]]; then DO_LINUX=true; fi
          if [[ "$TARGET" == "ios" ]]; then DO_IOS=true; fi
          if [[ "$TARGET" == "desktop-all" ]]; then DO_WINDOWS=true; DO_LINUX=true; fi
          if [[ "$TARGET" == "all" ]]; then DO_ANDROID=true; DO_WINDOWS=true; DO_LINUX=true; DO_IOS=true; DO_ANDROID_RELEASE=true; fi

          echo "do_android=$DO_ANDROID" >> "$GITHUB_OUTPUT"
          echo "do_android_release=$DO_ANDROID_RELEASE" >> "$GITHUB_OUTPUT"
          echo "do_windows=$DO_WINDOWS" >> "$GITHUB_OUTPUT"
          echo "do_linux=$DO_LINUX" >> "$GITHUB_OUTPUT"
          echo "do_ios=$DO_IOS" >> "$GITHUB_OUTPUT"

      - name: Show limits
        shell: bash
        run: |
          echo "Important:"
          echo "Android debug APK can be shared directly."
          echo "Android release for Play Store needs signing and Google Play Console."
          echo "iOS App Store needs Apple Developer account, certificates, provisioning profile, and macOS runner."
          echo "Windows/Linux desktop builds are generated with Tauri."
          echo "This workflow creates wrappers around your website URL."

  android:
    name: Build Android App
    needs: prepare-info
    if: needs.prepare-info.outputs.do_android == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux utilities
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick jq unzip zip curl

      - name: Create Capacitor Android project
        shell: bash
        run: |
          set -e
          mkdir app
          cd app
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npm install @capacitor/status-bar @capacitor/splash-screen @capacitor/app @capacitor/browser @capacitor/haptics @capacitor/keyboard @capacitor/network

          mkdir -p www
          cat > www/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=${ENABLE_ZOOM}" />
            <meta name="theme-color" content="${APP_COLOR}" />
            <title>${APP_NAME}</title>
            <style>
              html, body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background: ${APP_COLOR};
                color: white;
                font-family: Arial, sans-serif;
                overflow: hidden;
              }
              .loader {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 16px;
              }
              .spinner {
                width: 48px;
                height: 48px;
                border: 5px solid rgba(255,255,255,.25);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 1s linear infinite;
              }
              @keyframes spin { to { transform: rotate(360deg); } }
            </style>
          </head>
          <body>
            <div class="loader">
              <div class="spinner"></div>
              <strong>${SPLASH_TEXT}</strong>
            </div>
          </body>
          </html>
          EOF

          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir www

          cat > capacitor.config.json <<EOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "url": "${WEBSITE_URL}",
              "cleartext": ${ALLOW_HTTP}
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 1200,
                "launchAutoHide": true,
                "backgroundColor": "${APP_COLOR}",
                "androidScaleType": "CENTER_CROP",
                "showSpinner": true,
                "spinnerColor": "#ffffff"
              },
              "StatusBar": {
                "style": "DARK",
                "backgroundColor": "${STATUS_BAR_COLOR}",
                "overlaysWebView": false
              },
              "Keyboard": {
                "resize": "body",
                "style": "dark"
              }
            }
          }
          EOF

          npx cap add android
          npx cap sync android

      - name: Customize Android manifest and Gradle
        shell: bash
        run: |
          set -e
          cd app/android

          MANIFEST="app/src/main/AndroidManifest.xml"
          GRADLE="app/build.gradle"

          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE}/g" "$GRADLE" || true
          sed -i "s/versionName \".*\"/versionName \"${VERSION_NAME}\"/g" "$GRADLE" || true

          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi

          if ! grep -q "android.permission.ACCESS_NETWORK_STATE" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
          fi

          if [[ "${ALLOW_HTTP}" == "true" ]]; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MANIFEST" || true
          fi

          if [[ "${ORIENTATION}" != "unspecified" ]]; then
            sed -i "s/android:name=\".MainActivity\"/android:name=\".MainActivity\" android:screenOrientation=\"${ORIENTATION}\"/g" "$MANIFEST" || true
          fi

          if [[ "${FULLSCREEN}" == "true" ]]; then
            sed -i 's/android:theme="@style\/AppTheme.NoActionBarLaunch"/android:theme="@style\/AppTheme.NoActionBarLaunch" android:immersive="true"/g' "$MANIFEST" || true
          fi

          cat > app/src/main/res/values/strings.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${APP_NAME}</string>
              <string name="title_activity_main">${APP_NAME}</string>
              <string name="package_name">${APP_ID}</string>
              <string name="custom_url_scheme">${APP_ID}</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">${APP_COLOR}</color>
              <color name="colorPrimaryDark">${STATUS_BAR_COLOR}</color>
              <color name="navigationBarColor">${NAVIGATION_BAR_COLOR}</color>
          </resources>
          EOF

      - name: Generate Android app icons
        shell: bash
        run: |
          set -e
          cd app/android
          mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/drawable

          if [[ -n "${ICON_URL}" ]]; then
            curl -L "${ICON_URL}" -o /tmp/icon_input || true
          fi

          python3 - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          import os, pathlib

          app_color = os.environ.get("APP_COLOR", "#111827")
          app_name = os.environ.get("APP_NAME", "App")
          icon_url = os.environ.get("ICON_URL", "")
          letter = (app_name.strip()[:1] or "A").upper()

          def make_base(size):
              p = pathlib.Path("/tmp/icon_input")
              if icon_url and p.exists() and p.stat().st_size > 0:
                  try:
                      im = Image.open(p).convert("RGBA").resize((size, size))
                      return im
                  except Exception:
                      pass
              im = Image.new("RGBA", (size, size), app_color)
              d = ImageDraw.Draw(im)
              try:
                  font = ImageFont.truetype("DejaVuSans-Bold.ttf", int(size * 0.56))
              except Exception:
                  font = None
              bbox = d.textbbox((0, 0), letter, font=font)
              w, h = bbox[2] - bbox[0], bbox[3] - bbox[1]
              d.text(((size - w) / 2, (size - h) / 2 - size * 0.04), letter, fill="white", font=font)
              return im

          sizes = {
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192,
          }

          for folder, size in sizes.items():
              img = make_base(size)
              img.save(f"app/src/main/res/{folder}/ic_launcher.png")
              img.save(f"app/src/main/res/{folder}/ic_launcher_round.png")

          splash = Image.new("RGBA", (1080, 1920), app_color)
          icon = make_base(360)
          splash.alpha_composite(icon, ((1080-360)//2, (1920-360)//2))
          splash.save("app/src/main/res/drawable/splash.png")
          PY

      - name: Patch Android MainActivity for better WebView behavior
        shell: bash
        run: |
          set -e
          cd app/android

          MAIN="app/src/main/java/$(echo "${APP_ID}" | tr '.' '/')/MainActivity.java"
          if [[ -f "$MAIN" ]]; then
            cat > "$MAIN" <<'EOF'
          package PLACEHOLDER_PACKAGE;

          import android.os.Bundle;
          import android.view.View;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  if ("PLACEHOLDER_FULLSCREEN".equals("true")) {
                      getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                      );
                  }

                  try {
                      WebView webView = this.bridge.getWebView();
                      WebSettings settings = webView.getSettings();
                      settings.setJavaScriptEnabled(true);
                      settings.setDomStorageEnabled(true);
                      settings.setDatabaseEnabled(true);
                      settings.setMediaPlaybackRequiresUserGesture(false);
                      settings.setLoadWithOverviewMode(true);
                      settings.setUseWideViewPort(true);
                      settings.setBuiltInZoomControls(PLACEHOLDER_ZOOM);
                      settings.setDisplayZoomControls(false);
                      settings.setSupportZoom(PLACEHOLDER_ZOOM);
                      settings.setUserAgentString(settings.getUserAgentString() + " PLACEHOLDER_UA");
                  } catch (Exception ignored) {}
              }
          }
          EOF
            sed -i "s/PLACEHOLDER_PACKAGE/${APP_ID}/g" "$MAIN"
            sed -i "s/PLACEHOLDER_FULLSCREEN/${FULLSCREEN}/g" "$MAIN"
            sed -i "s/PLACEHOLDER_ZOOM/${ENABLE_ZOOM}/g" "$MAIN"
            sed -i "s/PLACEHOLDER_UA/${USER_AGENT_SUFFIX}/g" "$MAIN"
          fi

      - name: Build Android debug APK
        if: github.event.inputs.android_build_mode == 'apk' || github.event.inputs.android_build_mode == 'both' || needs.prepare-info.outputs.do_android_release != 'true'
        shell: bash
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Build Android unsigned release AAB
        if: github.event.inputs.android_build_mode == 'aab' || github.event.inputs.android_build_mode == 'both' || needs.prepare-info.outputs.do_android_release == 'true'
        shell: bash
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew bundleRelease || true

      - name: Upload Android APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload Android AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-unsigned
          path: app/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore

  windows:
    name: Build Windows EXE MSI
    needs: prepare-info
    if: needs.prepare-info.outputs.do_windows == 'true'
    runs-on: windows-latest

    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create Tauri Windows project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path desktop -Force | Out-Null
          Set-Location desktop

          npm init -y
          npm install @tauri-apps/cli @tauri-apps/api vite typescript

          New-Item -ItemType Directory -Path src -Force | Out-Null
          New-Item -ItemType Directory -Path src-tauri -Force | Out-Null
          New-Item -ItemType Directory -Path src-tauri/src -Force | Out-Null
          New-Item -ItemType Directory -Path src-tauri/icons -Force | Out-Null

          @"
          <!doctype html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>$env:APP_NAME</title>
              <style>
                html, body { margin:0; width:100%; height:100%; background:$env:APP_COLOR; color:white; font-family:Arial; overflow:hidden; }
                .loader { height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
                .spinner { width:48px; height:48px; border:5px solid rgba(255,255,255,.25); border-top-color:white; border-radius:50%; animation:spin 1s linear infinite; }
                @keyframes spin { to { transform:rotate(360deg); } }
              </style>
            </head>
            <body>
              <div class="loader"><div class="spinner"></div><strong>$env:SPLASH_TEXT</strong></div>
              <script type="module" src="/src/main.js"></script>
            </body>
          </html>
          "@ | Set-Content -Encoding UTF8 index.html

          @"
          setTimeout(() => {
            window.location.href = "$env:WEBSITE_URL";
          }, 300);
          "@ | Set-Content -Encoding UTF8 src/main.js

          @"
          {
            "scripts": {
              "dev": "vite",
              "build": "vite build",
              "tauri": "tauri"
            },
            "dependencies": {
              "@tauri-apps/api": "latest",
              "@tauri-apps/cli": "latest",
              "vite": "latest",
              "typescript": "latest"
            },
            "devDependencies": {}
          }
          "@ | Set-Content -Encoding UTF8 package.json

          @"
          [package]
          name = "website_desktop_app"
          version = "$env:VERSION_NAME"
          description = "$env:APP_NAME"
          authors = ["Generated"]
          license = "MIT"
          repository = ""
          edition = "2021"

          [build-dependencies]
          tauri-build = { version = "1", features = [] }

          [dependencies]
          tauri = { version = "1", features = ["shell-open"] }
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"

          [features]
          default = ["custom-protocol"]
          custom-protocol = ["tauri/custom-protocol"]
          "@ | Set-Content -Encoding UTF8 src-tauri/Cargo.toml

          @"
          fn main() {
            tauri_build::build()
          }
          "@ | Set-Content -Encoding UTF8 src-tauri/build.rs

          @"
          #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]

          fn main() {
            tauri::Builder::default()
              .run(tauri::generate_context!())
              .expect("error while running tauri application");
          }
          "@ | Set-Content -Encoding UTF8 src-tauri/src/main.rs

          @"
          {
            "build": {
              "beforeBuildCommand": "npm run build",
              "beforeDevCommand": "npm run dev",
              "devPath": "http://localhost:5173",
              "distDir": "../dist"
            },
            "package": {
              "productName": "$env:APP_NAME",
              "version": "$env:VERSION_NAME"
            },
            "tauri": {
              "allowlist": {
                "all": false,
                "shell": {
                  "all": false,
                  "open": true
                }
              },
              "bundle": {
                "active": true,
                "targets": "all",
                "identifier": "$env:APP_ID",
                "icon": [
                  "icons/icon.ico"
                ],
                "windows": {
                  "certificateThumbprint": null,
                  "digestAlgorithm": "sha256",
                  "timestampUrl": ""
                }
              },
              "security": {
                "csp": null
              },
              "windows": [
                {
                  "title": "$env:APP_NAME",
                  "width": $env:DESKTOP_WIDTH,
                  "height": $env:DESKTOP_HEIGHT,
                  "resizable": $env:DESKTOP_RESIZABLE,
                  "fullscreen": $env:DESKTOP_FULLSCREEN,
                  "url": "$env:WEBSITE_URL"
                }
              ]
            }
          }
          "@ | Set-Content -Encoding UTF8 src-tauri/tauri.conf.json

      - name: Generate Windows icon
        shell: pwsh
        run: |
          Set-Location desktop
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap 256,256
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $color = [System.Drawing.ColorTranslator]::FromHtml($env:APP_COLOR)
          $g.Clear($color)
          $font = New-Object System.Drawing.Font("Arial",96,[System.Drawing.FontStyle]::Bold)
          $brush = [System.Drawing.Brushes]::White
          $letter = $env:APP_NAME.Substring(0,1).ToUpper()
          $size = $g.MeasureString($letter,$font)
          $g.DrawString($letter,$font,$brush,(256-$size.Width)/2,(256-$size.Height)/2)
          $bmp.Save("src-tauri/icons/icon.png",[System.Drawing.Imaging.ImageFormat]::Png)
          Copy-Item "src-tauri/icons/icon.png" "src-tauri/icons/icon.ico"

      - name: Install dependencies and build Windows
        shell: pwsh
        run: |
          Set-Location desktop
          npm install
          npx tauri build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-msi
          path: |
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: ignore

  linux:
    name: Build Linux DEB AppImage
    needs: prepare-info
    if: needs.prepare-info.outputs.do_linux == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Install Linux desktop dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            imagemagick \
            curl \
            build-essential

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create Tauri Linux project
        shell: bash
        run: |
          set -e
          mkdir -p desktop/src desktop/src-tauri/src desktop/src-tauri/icons
          cd desktop
          npm init -y
          npm install @tauri-apps/cli @tauri-apps/api vite typescript

          cat > index.html <<EOF
          <!doctype html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>${APP_NAME}</title>
              <style>
                html, body { margin:0; width:100%; height:100%; background:${APP_COLOR}; color:white; font-family:Arial; overflow:hidden; }
                .loader { height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
                .spinner { width:48px; height:48px; border:5px solid rgba(255,255,255,.25); border-top-color:white; border-radius:50%; animation:spin 1s linear infinite; }
                @keyframes spin { to { transform:rotate(360deg); } }
              </style>
            </head>
            <body>
              <div class="loader"><div class="spinner"></div><strong>${SPLASH_TEXT}</strong></div>
              <script type="module" src="/src/main.js"></script>
            </body>
          </html>
          EOF

          cat > src/main.js <<EOF
          setTimeout(() => {
            window.location.href = "${WEBSITE_URL}";
          }, 300);
          EOF

          cat > package.json <<EOF
          {
            "scripts": {
              "dev": "vite",
              "build": "vite build",
              "tauri": "tauri"
            },
            "dependencies": {
              "@tauri-apps/api": "latest",
              "@tauri-apps/cli": "latest",
              "vite": "latest",
              "typescript": "latest"
            },
            "devDependencies": {}
          }
          EOF

          cat > src-tauri/Cargo.toml <<EOF
          [package]
          name = "website_desktop_app"
          version = "${VERSION_NAME}"
          description = "${APP_NAME}"
          authors = ["Generated"]
          license = "MIT"
          repository = ""
          edition = "2021"

          [build-dependencies]
          tauri-build = { version = "1", features = [] }

          [dependencies]
          tauri = { version = "1", features = ["shell-open"] }
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"

          [features]
          default = ["custom-protocol"]
          custom-protocol = ["tauri/custom-protocol"]
          EOF

          cat > src-tauri/build.rs <<EOF
          fn main() {
            tauri_build::build()
          }
          EOF

          cat > src-tauri/src/main.rs <<EOF
          #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]

          fn main() {
            tauri::Builder::default()
              .run(tauri::generate_context!())
              .expect("error while running tauri application");
          }
          EOF

          cat > src-tauri/tauri.conf.json <<EOF
          {
            "build": {
              "beforeBuildCommand": "npm run build",
              "beforeDevCommand": "npm run dev",
              "devPath": "http://localhost:5173",
              "distDir": "../dist"
            },
            "package": {
              "productName": "${APP_NAME}",
              "version": "${VERSION_NAME}"
            },
            "tauri": {
              "allowlist": {
                "all": false,
                "shell": {
                  "all": false,
                  "open": true
                }
              },
              "bundle": {
                "active": true,
                "targets": "all",
                "identifier": "${APP_ID}",
                "icon": [
                  "icons/icon.png"
                ]
              },
              "security": {
                "csp": null
              },
              "windows": [
                {
                  "title": "${APP_NAME}",
                  "width": ${DESKTOP_WIDTH},
                  "height": ${DESKTOP_HEIGHT},
                  "resizable": ${DESKTOP_RESIZABLE},
                  "fullscreen": ${DESKTOP_FULLSCREEN},
                  "url": "${WEBSITE_URL}"
                }
              ]
            }
          }
          EOF

      - name: Generate Linux icon
        shell: bash
        run: |
          set -e
          cd desktop
          convert -size 512x512 xc:"${APP_COLOR}" \
            -gravity center \
            -fill white \
            -pointsize 250 \
            -font DejaVu-Sans-Bold \
            -annotate 0 "$(echo "${APP_NAME:0:1}" | tr '[:lower:]' '[:upper:]')" \
            src-tauri/icons/icon.png

      - name: Build Linux desktop app
        shell: bash
        run: |
          cd desktop
          npm install
          npx tauri build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-appimage
          path: |
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.AppImage
          if-no-files-found: ignore

  ios:
    name: Build iOS Project
    needs: prepare-info
    if: needs.prepare-info.outputs.do_ios == 'true'
    runs-on: macos-latest

    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create Capacitor iOS project
        shell: bash
        run: |
          set -e
          mkdir app
          cd app
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm install @capacitor/status-bar @capacitor/splash-screen @capacitor/app @capacitor/browser

          mkdir -p www
          cat > www/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <meta name="theme-color" content="${APP_COLOR}" />
            <title>${APP_NAME}</title>
            <style>
              html, body { margin:0; width:100%; height:100%; background:${APP_COLOR}; color:white; font-family:Arial; overflow:hidden; }
              .loader { height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
              .spinner { width:48px; height:48px; border:5px solid rgba(255,255,255,.25); border-top-color:white; border-radius:50%; animation:spin 1s linear infinite; }
              @keyframes spin { to { transform:rotate(360deg); } }
            </style>
          </head>
          <body>
            <div class="loader"><div class="spinner"></div><strong>${SPLASH_TEXT}</strong></div>
          </body>
          </html>
          EOF

          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir www

          cat > capacitor.config.json <<EOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "url": "${WEBSITE_URL}",
              "cleartext": ${ALLOW_HTTP}
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 1200,
                "launchAutoHide": true,
                "backgroundColor": "${APP_COLOR}",
                "showSpinner": true,
                "spinnerColor": "#ffffff"
              },
              "StatusBar": {
                "style": "DARK",
                "backgroundColor": "${STATUS_BAR_COLOR}"
              }
            }
          }
          EOF

          npx cap add ios
          npx cap sync ios

      - name: Build unsigned iOS simulator app
        shell: bash
        run: |
          set -e
          cd app/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip iOS project
        shell: bash
        run: |
          cd app
          zip -r ios-capacitor-project.zip ios capacitor.config.json package.json www

      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project-unsigned
          path: app/ios-capacitor-project.zip
          if-no-files-found: ignore

  release:
    name: Optional GitHub Release
    needs: [android, windows, linux, ios]
    if: always() && github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files

      - name: Zip release files
        shell: bash
        run: |
          find release-files -type f -maxdepth 10 || true
          zip -r mega-app-builds.zip release-files || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.app_name }} ${{ github.event.inputs.release_tag }}
          files: mega-app-builds.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
