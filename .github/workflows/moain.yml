      - name: Generate all app icons (standard, adaptive, monochrome)
        run: |
          set -e
          cd app/android

          echo "==================================================================="
          echo "Generating app icons"
          echo "==================================================================="

          for dir in \
            app/src/main/res/mipmap-mdpi \
            app/src/main/res/mipmap-hdpi \
            app/src/main/res/mipmap-xhdpi \
            app/src/main/res/mipmap-xxhdpi \
            app/src/main/res/mipmap-xxxhdpi \
            app/src/main/res/mipmap-anydpi-v26 \
            app/src/main/res/drawable \
            app/src/main/res/drawable-night; do
            mkdir -p "$dir"
          done

          # Attempt to download icon
          if [[ -n "${ICON_URL}" ]]; then
            echo "Downloading icon from: ${ICON_URL}"
            curl -fsSL --connect-timeout 15 --retry 3 --retry-delay 5 \
              "${ICON_URL}" -o /tmp/icon_input.png 2>/dev/null || {
              echo "WARNING: Failed to download icon. Will generate letter icon."
              rm -f /tmp/icon_input.png
            }
          fi

          python3 << 'ICONPY'
          import os, sys, pathlib, math
          from PIL import Image, ImageDraw, ImageFont, ImageFilter

          app_color   = os.environ.get("APP_COLOR", "#111827")
          fg_color    = os.environ.get("ICON_FG_COLOR", "#FFFFFF")
          bg_color    = os.environ.get("ICON_BG_COLOR", "#111827")
          icon_url    = os.environ.get("ICON_URL", "")
          app_name    = os.environ.get("APP_NAME", "App")
          adaptive    = os.environ.get("ADAPTIVE_ICON", "true") == "true"
          monochrome  = os.environ.get("MONOCHROME_ICON", "true") == "true"
          letter      = (app_name.strip()[:1] or "A").upper()
          input_path  = pathlib.Path("/tmp/icon_input.png")

          def hex_to_rgb(hex_color):
              hex_color = hex_color.lstrip('#')
              if len(hex_color) == 3:
                  hex_color = ''.join([c*2 for c in hex_color])
              return tuple(int(hex_color[i:i+2], 16) for i in (0, 2, 4))

          def create_letter_icon(size, bg=None, fg=None, padding_ratio=0.18):
              bg_rgb = hex_to_rgb(bg or app_color)
              fg_rgb = hex_to_rgb(fg or fg_color)
              img = Image.new("RGBA", (size, size), (*bg_rgb, 255))
              draw = ImageDraw.Draw(img)
              font_size = int(size * 0.52)
              font = None
              for font_path in [
                  "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                  "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf",
                  "/usr/share/fonts/truetype/freefont/FreeSansBold.ttf",
                  "/usr/share/fonts/dejavu/DejaVuSans-Bold.ttf",
              ]:
                  if pathlib.Path(font_path).exists():
                      try:
                          font = ImageFont.truetype(font_path, font_size)
                          break
                      except Exception:
                          continue
              if font is None:
                  font = ImageFont.load_default()
              bbox = draw.textbbox((0, 0), letter, font=font)
              w = bbox[2] - bbox[0]
              h = bbox[3] - bbox[1]
              x = (size - w) / 2 - bbox[0]
              y = (size - h) / 2 - bbox[1] - size * 0.02
              draw.text((x, y), letter, fill=(*fg_rgb, 255), font=font)
              return img

          def get_base_icon(size):
              if icon_url and input_path.exists() and input_path.stat().st_size > 1024:
                  try:
                      img = Image.open(input_path).convert("RGBA")
                      img = img.resize((size, size), Image.LANCZOS)
                      return img
                  except Exception as e:
                      print(f"WARNING: Could not process downloaded icon: {e}. Using letter icon.")
              return create_letter_icon(size)

          # Standard launcher icons
          standard_sizes = {
              "mipmap-mdpi":    48,
              "mipmap-hdpi":    72,
              "mipmap-xhdpi":   96,
              "mipmap-xxhdpi":  144,
              "mipmap-xxxhdpi": 192,
          }

          for folder, size in standard_sizes.items():
              img = get_base_icon(size)
              path = f"app/src/main/res/{folder}"
              os.makedirs(path, exist_ok=True)
              img.save(f"{path}/ic_launcher.png", "PNG", optimize=True)
              img.save(f"{path}/ic_launcher_round.png", "PNG", optimize=True)
              print(f"Generated {folder}/ic_launcher.png at {size}px")

          # Adaptive icon foreground layers
          if adaptive:
              adaptive_sizes = {
                  "mipmap-mdpi":    108,
                  "mipmap-hdpi":    162,
                  "mipmap-xhdpi":   216,
                  "mipmap-xxhdpi":  324,
                  "mipmap-xxxhdpi": 432,
              }

              for folder, size in adaptive_sizes.items():
                  path = f"app/src/main/res/{folder}"
                  os.makedirs(path, exist_ok=True)

                  if icon_url and input_path.exists() and input_path.stat().st_size > 1024:
                      try:
                          fg_img = Image.new("RGBA", (size, size), (0, 0, 0, 0))
                          icon = Image.open(input_path).convert("RGBA")
                          inner = int(size * 0.72)
                          icon = icon.resize((inner, inner), Image.LANCZOS)
                          offset = (size - inner) // 2
                          fg_img.paste(icon, (offset, offset), icon)
                      except Exception:
                          fg_img = create_letter_icon(size, bg="#00000000", fg=fg_color)
                  else:
                      fg_img = create_letter_icon(size, bg="#00000000", fg=fg_color)

                  fg_img.save(f"{path}/ic_launcher_foreground.png", "PNG", optimize=True)
                  print(f"Generated adaptive foreground {folder} at {size}px")

              # Background color drawable
              bg_xml = f'''<?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
                 android:shape="rectangle">
              <solid android:color="{bg_color}" />
          </shape>'''
              with open("app/src/main/res/drawable/ic_launcher_background.xml", "w") as f:
                  f.write(bg_xml)

              # Adaptive icon XML
              adaptive_xml = '''<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>'''
              with open("app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml", "w") as f:
                  f.write(adaptive_xml)
              with open("app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml", "w") as f:
                  f.write(adaptive_xml)

              print("Adaptive icon XML files generated")

          # Monochrome icon for Android 13+
          if monochrome:
              mono_size = 108
              bg_rgb = hex_to_rgb(bg_color)
              mono_img = create_letter_icon(mono_size, bg="#FFFFFF", fg="#000000")
              mono_alpha = mono_img.convert("LA")
              mono_rgba = mono_alpha.convert("RGBA")
              mono_rgba.save("app/src/main/res/drawable/ic_launcher_monochrome.png", "PNG", optimize=True)

              # Update adaptive-icon XML to include monochrome
              adaptive_xml_mono = '''<?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
              <monochrome android:drawable="@drawable/ic_launcher_monochrome"/>
          </adaptive-icon>'''
              with open("app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml", "w") as f:
                  f.write(adaptive_xml_mono)
              with open("app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml", "w") as f:
                  f.write(adaptive_xml_mono)

              print("Monochrome icon generated")

          print("All icons generated successfully")
          ICONPY

          echo "Icon generation complete"

      # -------------------------------------------------------------------------
      # STEP 10 - Generate splash screen
      # -------------------------------------------------------------------------

      - name: Generate splash screen drawables
        run: |
          set -e
          cd app/android

          echo "==================================================================="
          echo "Generating splash screen"
          echo "==================================================================="

          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/drawable-night

          # Download splash image if URL provided
          if [[ -n "${SPLASH_IMAGE_URL}" ]]; then
            echo "Downloading splash image from: ${SPLASH_IMAGE_URL}"
            curl -fsSL --connect-timeout 15 --retry 3 \
              "${SPLASH_IMAGE_URL}" -o /tmp/splash_input.png 2>/dev/null || {
              echo "WARNING: Failed to download splash image. Using solid color."
              rm -f /tmp/splash_input.png
            }
          fi

          python3 << 'SPLASHPY'
          import os, pathlib
          from PIL import Image, ImageDraw

          app_color     = os.environ.get("APP_COLOR", "#111827")
          splash_url    = os.environ.get("SPLASH_IMAGE_URL", "")
          splash_path   = pathlib.Path("/tmp/splash_input.png")

          def hex_to_rgb(hex_color):
              hex_color = hex_color.lstrip('#')
              if len(hex_color) == 3:
                  hex_color = ''.join([c*2 for c in hex_color])
              return tuple(int(hex_color[i:i+2], 16) for i in (0, 2, 4))

          bg_rgb = hex_to_rgb(app_color)

          # Portrait splash (1080x1920)
          splash = Image.new("RGBA", (1080, 1920), (*bg_rgb, 255))

          if splash_url and splash_path.exists() and splash_path.stat().st_size > 1024:
              try:
                  img = Image.open(splash_path).convert("RGBA")
                  # Scale to fit width
                  aspect = img.size[1] / img.size[0]
                  new_w = 1080
                  new_h = int(new_w * aspect)
                  img = img.resize((new_w, new_h), Image.LANCZOS)
                  y_offset = (1920 - new_h) // 2
                  splash.alpha_composite(img, (0, y_offset))
                  print("Splash image composited successfully")
              except Exception as e:
                  print(f"WARNING: Could not process splash image: {e}. Using solid color.")

          splash_final = splash.convert("RGB")
          splash_final.save("app/src/main/res/drawable/splash.png", "PNG", optimize=True)

          # Landscape splash (1920x1080)
          splash_land = Image.new("RGB", (1920, 1080), (*bg_rgb,))
          splash_land.save("app/src/main/res/drawable/splash_land.png", "PNG", optimize=True)

          print("Splash screens generated")
          SPLASHPY

          # Night mode splash (same color, but could be customized)
          cp app/src/main/res/drawable/splash.png app/src/main/res/drawable-night/splash.png

          echo "Splash screen generation complete"

      # -------------------------------------------------------------------------
      # STEP 11 - Generate and patch MainActivity
      # -------------------------------------------------------------------------

      - name: Generate MainActivity with all features
        run: |
          set -e
          cd app/android

          echo "==================================================================="
          echo "Generating MainActivity"
          echo "==================================================================="

          # Find the Java source directory
          JAVA_DIR="app/src/main/java/$(echo "${APP_ID}" | tr '.' '/')"
          mkdir -p "${JAVA_DIR}"
          MAIN="${JAVA_DIR}/MainActivity.java"

          # Map cache mode to Android constant
          case "${CACHE_MODE:-default}" in
            cache_else_network) CACHE_CONST="WebSettings.LOAD_CACHE_ELSE_NETWORK" ;;
            network_else_cache) CACHE_CONST="WebSettings.LOAD_DEFAULT" ;;
