                  }

                  // Keep screen on
                  if (${KEEP_SCREEN_ON:-false}) {
                      window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                  }

                  // Status bar color
                  try {
                      window.setStatusBarColor(Color.parseColor("${STATUS_BAR_COLOR:-#000000}"));
                  } catch (Exception e) {
                      window.setStatusBarColor(Color.BLACK);
                  }

                  // Navigation bar color
                  try {
                      window.setNavigationBarColor(Color.parseColor("${NAVIGATION_BAR_COLOR:-#000000}"));
                  } catch (Exception e) {
                      window.setNavigationBarColor(Color.BLACK);
                  }

                  // Status bar icon style (light or dark icons)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      WindowInsetsController controller = window.getInsetsController();
                      if (controller != null) {
                          String statusStyle = "${STATUS_BAR_STYLE:-light}";
                          String navStyle    = "${NAVIGATION_BAR_STYLE:-light}";
                          int flags = 0;
                          if ("dark".equals(statusStyle)) {
