      # STEP 7 - Customize AndroidManifest.xml
      # -------------------------------------------------------------------------

      - name: Customize AndroidManifest.xml
        run: |
          set -e
          cd app/android

          echo "==================================================================="
          echo "Customizing AndroidManifest.xml"
          echo "==================================================================="

          MANIFEST="app/src/main/AndroidManifest.xml"

          echo "Original AndroidManifest.xml:"
          cat "$MANIFEST"

          python3 << 'PYMANIFEST'
          import os
          import re

          manifest_path = "app/src/main/AndroidManifest.xml"
          with open(manifest_path, "r") as f:
              content = f.read()

          def add_permission(content, perm):
              if perm not in content:
                  content = content.replace(
                      "<manifest ",
                      f'<manifest ',
                      1
                  )
                  # Insert after first <manifest ...> close
                  content = re.sub(
                      r'(<manifest[^>]+>)',
                      r'\1\n    <uses-permission android:name="' + perm + '" />',
                      content, count=1
                  )
              return content

          # Always required
          for perm in [
              "android.permission.INTERNET",
              "android.permission.ACCESS_NETWORK_STATE",
              "android.permission.ACCESS_WIFI_STATE",
              "android.permission.CHANGE_NETWORK_STATE"
          ]:
              content = add_permission(content, perm)

          # Optional permissions based on inputs
          if os.environ.get("ENABLE_LOCATION") == "true":
              content = add_permission(content, "android.permission.ACCESS_FINE_LOCATION")
              content = add_permission(content, "android.permission.ACCESS_COARSE_LOCATION")

          if os.environ.get("ENABLE_CAMERA") == "true":
              content = add_permission(content, "android.permission.CAMERA")

          if os.environ.get("ENABLE_MICROPHONE") == "true":
              content = add_permission(content, "android.permission.RECORD_AUDIO")
              content = add_permission(content, "android.permission.MODIFY_AUDIO_SETTINGS")

          if os.environ.get("ENABLE_FILE_PICKER") == "true":
              content = add_permission(content, "android.permission.READ_EXTERNAL_STORAGE")
              content = add_permission(content, "android.permission.WRITE_EXTERNAL_STORAGE")
              content = add_permission(content, "android.permission.READ_MEDIA_IMAGES")
              content = add_permission(content, "android.permission.READ_MEDIA_VIDEO")

          if os.environ.get("ENABLE_DOWNLOADS") == "true":
              content = add_permission(content, "android.permission.DOWNLOAD_WITHOUT_NOTIFICATION")

          if os.environ.get("ENABLE_NOTIFICATIONS") == "true":
              content = add_permission(content, "android.permission.POST_NOTIFICATIONS")
              content = add_permission(content, "android.permission.VIBRATE")

          if os.environ.get("ENABLE_BLUETOOTH") == "true":
              content = add_permission(content, "android.permission.BLUETOOTH")
              content = add_permission(content, "android.permission.BLUETOOTH_ADMIN")
              content = add_permission(content, "android.permission.BLUETOOTH_CONNECT")
              content = add_permission(content, "android.permission.BLUETOOTH_SCAN")

          if os.environ.get("ENABLE_NFC") == "true":
              content = add_permission(content, "android.permission.NFC")

          # Clear text traffic
          if os.environ.get("ALLOW_HTTP") == "true":
              if "usesCleartextTraffic" not in content:
                  content = content.replace(
                      "<application ",
                      '<application android:usesCleartextTraffic="true" '
                  )

          # Screen orientation
          orientation = os.environ.get("ORIENTATION", "portrait")
          if orientation != "unspecified":
              content = re.sub(
                  r'(android:name="\.MainActivity")',
                  f'android:name=".MainActivity" android:screenOrientation="{orientation}"',
                  content
              )

          # Keep screen on
          if os.environ.get("KEEP_SCREEN_ON") == "true":
              content = re.sub(
                  r'(android:name="\.MainActivity"[^>]*)',
                  r'\1 android:keepScreenOn="true"',
                  content
              )

          # Hardware acceleration at application level
          if os.environ.get("HARDWARE_ACCELERATION", "true") == "true":
              if "android:hardwareAccelerated" not in content:
                  content = content.replace(
                      "<application ",
                      '<application android:hardwareAccelerated="true" '
                  )

          # Deep linking intent filter
          deep_scheme = os.environ.get("DEEP_LINK_SCHEME", "")
          deep_host = os.environ.get("DEEP_LINK_HOST", "")
          app_id = os.environ.get("APP_ID", "com.example.app")

          deep_intent = ""
          if deep_scheme:
              deep_intent += f'''
                  <intent-filter>
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="{deep_scheme}" />
                  </intent-filter>'''

          if deep_host:
              deep_intent += f'''
                  <intent-filter android:autoVerify="true">
                      <action android:name="android.intent.action.VIEW" />
                      <category android:name="android.intent.category.DEFAULT" />
                      <category android:name="android.intent.category.BROWSABLE" />
                      <data android:scheme="https" android:host="{deep_host}" />
                      <data android:scheme="http" android:host="{deep_host}" />
                  </intent-filter>'''

          if deep_intent:
              content = re.sub(
                  r'(android:name="\.MainActivity"[^>]*>)',
                  r'\1' + deep_intent,
                  content
              )

          # File provider for downloads and file picker
          if os.environ.get("ENABLE_FILE_PICKER") == "true" or os.environ.get("ENABLE_DOWNLOADS") == "true":
              if "FileProvider" not in content:
                  file_provider = f'''
              <provider
                  android:name="androidx.core.content.FileProvider"
                  android:authorities="{app_id}.fileprovider"
                  android:exported="false"
                  android:grantUriPermissions="true">
                  <meta-data
                      android:name="android.support.FILE_PROVIDER_PATHS"
                      android:resource="@xml/file_paths" />
              </provider>'''
                  content = content.replace("</application>", file_provider + "\n</application>")

          # Network security config reference
          if "networkSecurityConfig" not in content:
              content = content.replace(
                  "<application ",
                  '<application android:networkSecurityConfig="@xml/network_security_config" '
              )

          with open(manifest_path, "w") as f:
              f.write(content)

          print("AndroidManifest.xml customized successfully")
          PYMANIFEST

          echo "Updated AndroidManifest.xml:"
          cat "app/src/main/AndroidManifest.xml"

