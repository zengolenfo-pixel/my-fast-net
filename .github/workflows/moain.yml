###############################################################################
#                                                                             #
#         ULTIMATE NATIVE WEBVIEW APP BUILDER - PRODUCTION EDITION            #
#         Android APK / AAB + iOS Xcode Project - Maximum Stability           #
#                                                                             #
#         Created by Zygor - Instagram @zygorlap                              #
#         GitHub Actions Capacitor Workflow - Enterprise Grade                #
#                                                                             #
#         Features:                                                           #
#           - Native WebView with zero browser redirects                      #
#           - Full Android 14+ and iOS 17+ compatibility                      #
#           - Adaptive icons, monochrome icons, splash animations             #
#           - Signed release builds with auto keystore generation             #
#           - ProGuard/R8, multidex, APK shrinking                           #
#           - Offline fallback, service worker, PWA detection                 #
#           - Deep linking, intent handling, custom schemes                   #
#           - Hardware acceleration, smooth scrolling, caching                #
#           - Full permission handling (camera, mic, location, files)         #
#           - Download manager, file upload, media autoplay                   #
#           - GitHub Release with all artifacts + auto release notes          #
#           - Input validation, fallback generation, retry logic              #
#           - Detailed logging for every step                                 #
#                                                                             #
###############################################################################

name: Ultimate WebView App Builder - Android and iOS - By Zygor

on:
  workflow_dispatch:
    inputs:

      # =========================================================================
      # SECTION 1 - BUILD TARGETS
      # =========================================================================

      build_target:
        description: "Platform to build (android, ios, or both)"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - both

      android_output:
        description: "Android package type to produce"
        required: true
        default: "apk"
        type: choice
        options:
          - apk
          - aab
          - both

      build_type:
        description: "Build type (debug is unsigned and faster, release is signed and optimized)"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
          - both

      # =========================================================================
      # SECTION 2 - CORE APP IDENTITY
      # =========================================================================

      website_url:
        description: "Website URL to load inside the app (must start with https:// or http://)"
        required: true
        default: "https://example.com"

      app_name:
        description: "Display name shown under the app icon on the device"
        required: true
        default: "My App"

      app_id:
        description: "Unique reverse-domain package identifier (e.g. com.company.appname)"
        required: true
        default: "com.example.myapp"

      version_name:
        description: "Human-readable version string shown in app stores (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

      version_code:
        description: "Integer version code for Android (must increment with each release)"
        required: true
        default: "1"

      min_sdk_version:
        description: "Minimum Android API level (21=Android 5.0, 24=Android 7.0, 26=Android 8.0)"
        required: false
        default: "24"

      target_sdk_version:
        description: "Target Android API level (34=Android 14, 35=Android 15)"
        required: false
        default: "35"

      compile_sdk_version:
        description: "Compile SDK version (should match target SDK or higher)"
        required: false
        default: "35"

      # =========================================================================
      # SECTION 3 - VISUAL THEME AND COLORS
      # =========================================================================

      app_color:
        description: "Primary background and theme color in HEX format (e.g. #111827)"
        required: true
        default: "#111827"

      app_color_secondary:
        description: "Secondary accent color in HEX format for gradients and highlights"
        required: false
        default: "#1F2937"

      status_bar_color:
        description: "Android status bar background color in HEX"
        required: true
        default: "#000000"

      status_bar_style:
        description: "Android status bar icon style (light icons on dark bar, or dark icons on light bar)"
        required: false
        default: "light"
        type: choice
        options:
          - light
          - dark

      navigation_bar_color:
        description: "Android bottom navigation bar color in HEX"
        required: true
        default: "#000000"

      navigation_bar_style:
        description: "Android navigation bar icon style"
        required: false
        default: "light"
        type: choice
        options:
          - light
          - dark

      dark_mode_support:
        description: "Enable automatic dark mode support following system preference"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      # =========================================================================
      # SECTION 4 - SPLASH SCREEN
      # =========================================================================

      splash_text:
        description: "Loading text shown on splash screen while website loads"
        required: true
        default: "Loading..."

      splash_image_url:
        description: "Optional direct URL to a PNG or JPG image for the splash screen (leave empty to skip)"
        required: false
        default: ""

      splash_show_duration:
        description: "Milliseconds to display the splash screen before hiding it"
        required: false
        default: "2000"

      splash_fade_duration:
        description: "Milliseconds for splash fade-out animation"
        required: false
        default: "300"

      splash_animation:
        description: "Splash screen animation style"
        required: false
        default: "fade"
        type: choice
        options:
          - fade
          - slide
          - zoom
          - none

      loading_style:
        description: "Loading indicator style on the splash screen"
        required: false
        default: "spinner"
        type: choice
        options:
          - spinner
          - dots
          - bar
          - none

      # =========================================================================
      # SECTION 5 - ORIENTATION AND FULLSCREEN
      # =========================================================================

      orientation:
        description: "Forced screen orientation for the app"
        required: true
        default: "portrait"
        type: choice
        options:
          - portrait
          - landscape
          - sensorPortrait
          - sensorLandscape
          - sensor
          - unspecified

      fullscreen:
        description: "Enable immersive fullscreen mode hiding status and navigation bars"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      keep_screen_on:
        description: "Prevent the screen from sleeping while the app is active"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      # =========================================================================
      # SECTION 6 - NETWORK AND NAVIGATION
      # =========================================================================

      allow_http:
        description: "Allow loading plain HTTP URLs inside the WebView (requires cleartext traffic)"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      allow_navigation:
        description: "Comma-separated list of additional hosts allowed inside WebView (e.g. *.example.com,api.example.com)"
        required: false
        default: "*"

      external_links_behavior:
        description: "How to handle links that go outside the allowed navigation domains"
        required: false
        default: "block"
        type: choice
        options:
          - block
          - system_browser
          - in_app_browser

      user_agent_suffix:
        description: "Text appended to the WebView user-agent string for server-side detection"
        required: false
        default: "UltimateWebViewApp/1.0 Zygor/@zygorlap"

      custom_headers:
        description: "Custom HTTP headers to send with every WebView request (JSON format: {\"key\":\"value\"})"
        required: false
        default: ""

      ssl_error_handling:
        description: "How to handle SSL certificate errors (strict is safest, permissive for self-signed certs)"
        required: false
        default: "strict"
        type: choice
        options:
          - strict
          - permissive

      mixed_content:
        description: "Allow loading HTTP resources on an HTTPS page (needed for some legacy sites)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      deep_link_scheme:
        description: "Custom deep link URL scheme (e.g. myapp creates links like myapp://path)"
        required: false
        default: ""

      deep_link_host:
        description: "App Links verified host for Android deep linking (e.g. example.com)"
        required: false
        default: ""

      # =========================================================================
      # SECTION 7 - WEBVIEW BEHAVIOR AND PERFORMANCE
      # =========================================================================

      enable_zoom:
        description: "Allow users to pinch-to-zoom inside the WebView"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      pull_to_refresh:
        description: "Enable pull-down gesture to reload the current page"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      pull_to_refresh_color:
        description: "Color of the pull-to-refresh spinner in HEX"
        required: false
        default: "#FFFFFF"

      cache_mode:
        description: "WebView cache strategy for balancing speed and freshness"
        required: false
        default: "default"
        type: choice
        options:
          - default
          - cache_else_network
          - network_else_cache
          - cache_only
          - no_cache

      hardware_acceleration:
        description: "Enable GPU hardware acceleration for smoother rendering"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      media_autoplay:
        description: "Allow audio and video to autoplay without user interaction"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      dom_storage:
        description: "Enable DOM localStorage and sessionStorage for persistent site data"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      cookie_persistence:
        description: "Persist cookies and session data between app restarts"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      service_worker_support:
        description: "Enable service worker support for PWA capabilities and offline caching"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      pwa_detection:
        description: "Detect and notify website that it is running inside a native app container"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      safe_area_handling:
        description: "Inject safe area CSS variables for notch and punch-hole screen compatibility"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      disable_back_button:
        description: "Override back button to navigate WebView history instead of closing the app"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      # =========================================================================
      # SECTION 8 - OFFLINE AND FALLBACK
      # =========================================================================

      offline_fallback_html:
        description: "Custom HTML to show when the device has no internet connection (leave empty for auto-generated)"
        required: false
        default: ""

      offline_retry_interval:
        description: "Seconds between automatic reconnection attempts when offline"
        required: false
        default: "5"

      network_error_message:
        description: "Message shown on the offline fallback screen"
        required: false
        default: "No internet connection. Please check your network and try again."

      # =========================================================================
      # SECTION 9 - CUSTOM CODE INJECTION
      # =========================================================================

      custom_javascript:
        description: "JavaScript to inject into every page after it loads (do not include script tags)"
        required: false
        default: ""

      custom_css:
        description: "CSS to inject into every page (do not include style tags)"
        required: false
        default: ""

      custom_font_url:
        description: "Google Fonts or CDN URL to inject as a stylesheet (e.g. https://fonts.googleapis.com/css2?family=Inter)"
        required: false
        default: ""

      # =========================================================================
      # SECTION 10 - PERMISSIONS
      # =========================================================================

      enable_location:
        description: "Request fine and coarse location permissions from the user"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_camera:
        description: "Request camera permission for photo capture and QR scanning"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_microphone:
        description: "Request microphone permission for audio recording and voice calls"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_file_picker:
        description: "Allow the website to open the file picker for file uploads"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_downloads:
        description: "Enable the Android download manager so users can download files"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_notifications:
        description: "Request POST_NOTIFICATIONS permission (Android 13+)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_bluetooth:
        description: "Request Bluetooth permissions for BLE-capable web apps"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_nfc:
        description: "Request NFC permission for contactless interaction web apps"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      # =========================================================================
      # SECTION 11 - APP ICONS
      # =========================================================================

      icon_url:
        description: "Direct URL to a PNG or JPG image to use as the app icon (leave empty to auto-generate a letter icon)"
        required: false
        default: ""

      icon_foreground_color:
        description: "Foreground letter/symbol color for the auto-generated icon in HEX"
        required: false
        default: "#FFFFFF"

      icon_background_color:
        description: "Background color of the adaptive icon layer in HEX"
        required: false
        default: "#111827"

      adaptive_icon:
        description: "Generate Android adaptive icons supporting API 26+ rounded and squircle shapes"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      monochrome_icon:
        description: "Generate a monochrome version of the icon for Android 13+ themed icon support"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      # =========================================================================
      # SECTION 12 - SIGNING AND RELEASE
      # =========================================================================

      keystore_base64:
        description: "Base64-encoded keystore file content for signing release builds (leave empty to auto-generate)"
        required: false
        default: ""

      keystore_password:
        description: "Password for the keystore file (used only for release builds)"
        required: false
        default: "android"

      key_alias:
        description: "Key alias inside the keystore for signing"
        required: false
        default: "release"

      key_password:
        description: "Password for the signing key inside the keystore"
        required: false
        default: "android"

      proguard_enabled:
        description: "Enable ProGuard/R8 code shrinking and obfuscation on release builds"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      multidex_enabled:
        description: "Enable MultiDex for apps with more than 64K methods"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      resource_shrinking:
        description: "Remove unused resources from the APK to reduce file size"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      # =========================================================================
      # SECTION 13 - ANDROID BUILD OPTIONS
      # =========================================================================

      abi_filters:
        description: "CPU architectures to include in the APK (all is largest, armeabi-v7a+arm64-v8a covers 99% of devices)"
        required: false
        default: "armeabi-v7a,arm64-v8a"
        type: choice
        options:
          - "armeabi-v7a,arm64-v8a"
          - "arm64-v8a"
          - "armeabi-v7a"
          - "x86,x86_64"
          - "all"

      split_apks:
        description: "Generate per-ABI split APKs instead of one universal APK"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      create_github_release:
        description: "Automatically create a GitHub Release and upload all artifacts"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      # =========================================================================
      # SECTION 14 - IOS OPTIONS
      # =========================================================================

      ios_status_bar_style:
        description: "iOS status bar text and icon color style"
        required: false
        default: "DARK"
        type: choice
        options:
          - DARK
          - LIGHT
          - DEFAULT

      ios_deployment_target:
        description: "Minimum iOS version supported (14.0 covers 98% of active devices)"
        required: false
        default: "14.0"

      ios_background_modes:
        description: "iOS background execution modes (comma-separated: audio,location,fetch)"
        required: false
        default: ""

      ios_ats_allow_all:
        description: "Disable iOS App Transport Security to allow any HTTP or self-signed HTTPS connection"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

# =============================================================================
# ENVIRONMENT VARIABLES - All inputs exposed for every step
# =============================================================================

env:
  BUILD_TARGET:             ${{ github.event.inputs.build_target }}
  ANDROID_OUTPUT:           ${{ github.event.inputs.android_output }}
  BUILD_TYPE:               ${{ github.event.inputs.build_type }}
  WEBSITE_URL:              ${{ github.event.inputs.website_url }}
  APP_NAME:                 ${{ github.event.inputs.app_name }}
  APP_ID:                   ${{ github.event.inputs.app_id }}
  VERSION_NAME:             ${{ github.event.inputs.version_name }}
  VERSION_CODE:             ${{ github.event.inputs.version_code }}
  MIN_SDK:                  ${{ github.event.inputs.min_sdk_version }}
  TARGET_SDK:               ${{ github.event.inputs.target_sdk_version }}
  COMPILE_SDK:              ${{ github.event.inputs.compile_sdk_version }}
  APP_COLOR:                ${{ github.event.inputs.app_color }}
  APP_COLOR_SECONDARY:      ${{ github.event.inputs.app_color_secondary }}
  STATUS_BAR_COLOR:         ${{ github.event.inputs.status_bar_color }}
  STATUS_BAR_STYLE:         ${{ github.event.inputs.status_bar_style }}
  NAVIGATION_BAR_COLOR:     ${{ github.event.inputs.navigation_bar_color }}
  NAVIGATION_BAR_STYLE:     ${{ github.event.inputs.navigation_bar_style }}
  DARK_MODE_SUPPORT:        ${{ github.event.inputs.dark_mode_support }}
  SPLASH_TEXT:              ${{ github.event.inputs.splash_text }}
  SPLASH_IMAGE_URL:         ${{ github.event.inputs.splash_image_url }}
  SPLASH_DURATION:          ${{ github.event.inputs.splash_show_duration }}
  SPLASH_FADE:              ${{ github.event.inputs.splash_fade_duration }}
  SPLASH_ANIMATION:         ${{ github.event.inputs.splash_animation }}
  LOADING_STYLE:            ${{ github.event.inputs.loading_style }}
  ORIENTATION:              ${{ github.event.inputs.orientation }}
  FULLSCREEN:               ${{ github.event.inputs.fullscreen }}
  KEEP_SCREEN_ON:           ${{ github.event.inputs.keep_screen_on }}
  ALLOW_HTTP:               ${{ github.event.inputs.allow_http }}
  ALLOW_NAVIGATION:         ${{ github.event.inputs.allow_navigation }}
  EXTERNAL_LINKS:           ${{ github.event.inputs.external_links_behavior }}
  USER_AGENT_SUFFIX:        ${{ github.event.inputs.user_agent_suffix }}
  CUSTOM_HEADERS:           ${{ github.event.inputs.custom_headers }}
  SSL_ERROR_HANDLING:       ${{ github.event.inputs.ssl_error_handling }}
  MIXED_CONTENT:            ${{ github.event.inputs.mixed_content }}
  DEEP_LINK_SCHEME:         ${{ github.event.inputs.deep_link_scheme }}
  DEEP_LINK_HOST:           ${{ github.event.inputs.deep_link_host }}
  ENABLE_ZOOM:              ${{ github.event.inputs.enable_zoom }}
  PULL_TO_REFRESH:          ${{ github.event.inputs.pull_to_refresh }}
  PTR_COLOR:                ${{ github.event.inputs.pull_to_refresh_color }}
  CACHE_MODE:               ${{ github.event.inputs.cache_mode }}
  HARDWARE_ACCELERATION:    ${{ github.event.inputs.hardware_acceleration }}
  MEDIA_AUTOPLAY:           ${{ github.event.inputs.media_autoplay }}
  DOM_STORAGE:              ${{ github.event.inputs.dom_storage }}
  COOKIE_PERSISTENCE:       ${{ github.event.inputs.cookie_persistence }}
  SERVICE_WORKER:           ${{ github.event.inputs.service_worker_support }}
  PWA_DETECTION:            ${{ github.event.inputs.pwa_detection }}
  SAFE_AREA:                ${{ github.event.inputs.safe_area_handling }}
  DISABLE_BACK_BUTTON:      ${{ github.event.inputs.disable_back_button }}
  OFFLINE_HTML:             ${{ github.event.inputs.offline_fallback_html }}
  OFFLINE_RETRY:            ${{ github.event.inputs.offline_retry_interval }}
  OFFLINE_MSG:              ${{ github.event.inputs.network_error_message }}
  CUSTOM_JS:                ${{ github.event.inputs.custom_javascript }}
  CUSTOM_CSS:               ${{ github.event.inputs.custom_css }}
  CUSTOM_FONT_URL:          ${{ github.event.inputs.custom_font_url }}
  ENABLE_LOCATION:          ${{ github.event.inputs.enable_location }}
  ENABLE_CAMERA:            ${{ github.event.inputs.enable_camera }}
  ENABLE_MICROPHONE:        ${{ github.event.inputs.enable_microphone }}
  ENABLE_FILE_PICKER:       ${{ github.event.inputs.enable_file_picker }}
  ENABLE_DOWNLOADS:         ${{ github.event.inputs.enable_downloads }}
  ENABLE_NOTIFICATIONS:     ${{ github.event.inputs.enable_notifications }}
  ENABLE_BLUETOOTH:         ${{ github.event.inputs.enable_bluetooth }}
  ENABLE_NFC:               ${{ github.event.inputs.enable_nfc }}
  ICON_URL:                 ${{ github.event.inputs.icon_url }}
  ICON_FG_COLOR:            ${{ github.event.inputs.icon_foreground_color }}
  ICON_BG_COLOR:            ${{ github.event.inputs.icon_background_color }}
  ADAPTIVE_ICON:            ${{ github.event.inputs.adaptive_icon }}
  MONOCHROME_ICON:          ${{ github.event.inputs.monochrome_icon }}
  KEYSTORE_B64:             ${{ github.event.inputs.keystore_base64 }}
  KEYSTORE_PASS:            ${{ github.event.inputs.keystore_password }}
  KEY_ALIAS:                ${{ github.event.inputs.key_alias }}
  KEY_PASS:                 ${{ github.event.inputs.key_password }}
  PROGUARD_ENABLED:         ${{ github.event.inputs.proguard_enabled }}
  MULTIDEX_ENABLED:         ${{ github.event.inputs.multidex_enabled }}
  RESOURCE_SHRINKING:       ${{ github.event.inputs.resource_shrinking }}
  ABI_FILTERS:              ${{ github.event.inputs.abi_filters }}
  SPLIT_APKS:               ${{ github.event.inputs.split_apks }}
  CREATE_RELEASE:           ${{ github.event.inputs.create_github_release }}
  IOS_STATUS_STYLE:         ${{ github.event.inputs.ios_status_bar_style }}
  IOS_DEPLOYMENT:           ${{ github.event.inputs.ios_deployment_target }}
  IOS_BG_MODES:             ${{ github.event.inputs.ios_background_modes }}
  IOS_ATS_ALLOW_ALL:        ${{ github.event.inputs.ios_ats_allow_all }}
  CREATOR:                  "Zygor"
  CREATOR_INSTAGRAM:        "@zygorlap"

# =============================================================================
# REUSABLE RETRY FUNCTION - Used across all jobs
# =============================================================================

defaults:
  run:
    shell: bash

# =============================================================================
# JOBS
# =============================================================================

jobs:

  # ===========================================================================
  # JOB 1 - INPUT VALIDATION
  # ===========================================================================

  validate:
    name: Validate Inputs and Configuration
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.check.outputs.valid }}
      app_id_safe: ${{ steps.check.outputs.app_id_safe }}
      url_scheme: ${{ steps.check.outputs.url_scheme }}

    steps:

      - name: Validate all workflow inputs
        id: check
        run: |
          set -e
          echo "==================================================================="
          echo " Ultimate WebView App Builder - Input Validation"
          echo " Created by ${CREATOR} - Instagram ${CREATOR_INSTAGRAM}"
          echo "==================================================================="

          ERRORS=0

          # Validate website URL
          echo "Checking website URL: ${WEBSITE_URL}"
          if [[ -z "${WEBSITE_URL}" ]]; then
            echo "ERROR: website_url is required"
            ERRORS=$((ERRORS+1))
          elif [[ ! "${WEBSITE_URL}" =~ ^https?:// ]]; then
            echo "ERROR: website_url must start with http:// or https://"
            ERRORS=$((ERRORS+1))
          else
            echo "OK: website_url is valid"
          fi

          # Validate package ID format
          echo "Checking app_id: ${APP_ID}"
          if [[ ! "${APP_ID}" =~ ^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z][a-zA-Z0-9_]*){2,}$ ]]; then
            echo "ERROR: app_id '${APP_ID}' is not valid. Must be reverse domain like com.company.app"
            ERRORS=$((ERRORS+1))
          else
            echo "OK: app_id is valid"
          fi

          # Validate version code is integer
          echo "Checking version_code: ${VERSION_CODE}"
          if [[ ! "${VERSION_CODE}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: version_code must be a positive integer"
            ERRORS=$((ERRORS+1))
          else
            echo "OK: version_code is valid"
          fi

          # Validate version name format
          echo "Checking version_name: ${VERSION_NAME}"
          if [[ ! "${VERSION_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "WARNING: version_name '${VERSION_NAME}' does not follow semver format (e.g. 1.0.0). Proceeding anyway."
          else
            echo "OK: version_name is valid"
          fi

          # Validate HEX colors
          for COLOR_VAR in APP_COLOR STATUS_BAR_COLOR NAVIGATION_BAR_COLOR ICON_FG_COLOR ICON_BG_COLOR; do
            COLOR_VAL="${!COLOR_VAR}"
            if [[ -n "${COLOR_VAL}" ]] && [[ ! "${COLOR_VAL}" =~ ^#[0-9A-Fa-f]{3}([0-9A-Fa-f]{3})?$ ]]; then
              echo "WARNING: ${COLOR_VAR} value '${COLOR_VAL}' does not look like a valid HEX color. Using default."
            else
              echo "OK: ${COLOR_VAR} is valid"
            fi
          done

          # Validate SDK versions are integers
          for SDK_VAR in MIN_SDK TARGET_SDK COMPILE_SDK; do
            SDK_VAL="${!SDK_VAR}"
            if [[ ! "${SDK_VAL}" =~ ^[0-9]+$ ]]; then
              echo "ERROR: ${SDK_VAR} must be a positive integer"
              ERRORS=$((ERRORS+1))
            else
              echo "OK: ${SDK_VAR}=${SDK_VAL}"
            fi
          done

          # Determine URL scheme for safe use
          URL_SCHEME="https"
          if [[ "${WEBSITE_URL}" =~ ^http:// ]]; then
            URL_SCHEME="http"
          fi

          # Sanitize app_id for use as path
          APP_ID_SAFE=$(echo "${APP_ID}" | tr '.' '/')

          if [[ $ERRORS -gt 0 ]]; then
            echo "==================================================================="
            echo "VALIDATION FAILED: $ERRORS error(s) found. Fix the inputs and retry."
            echo "==================================================================="
            exit 1
          fi

          echo "valid=true" >> "$GITHUB_OUTPUT"
          echo "app_id_safe=${APP_ID_SAFE}" >> "$GITHUB_OUTPUT"
          echo "url_scheme=${URL_SCHEME}" >> "$GITHUB_OUTPUT"

          echo "==================================================================="
          echo "VALIDATION PASSED - All inputs are valid"
          echo "==================================================================="

  # ===========================================================================
  # JOB 2 - ANDROID BUILD
  # ===========================================================================

  android:
    name: Build Android APK and AAB
    needs: validate
    if: |
      needs.validate.outputs.valid == 'true' &&
      (github.event.inputs.build_target == 'android' || github.event.inputs.build_target == 'both')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      # -------------------------------------------------------------------------
      # STEP 1 - System setup
      # -------------------------------------------------------------------------

      - name: Setup Java 21 LTS
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies with retry
        run: |
          echo "==================================================================="
          echo "Installing system dependencies"
          echo "==================================================================="

          retry_apt() {
            local attempt=1
            local max=3
            while [[ $attempt -le $max ]]; do
              echo "Attempt $attempt of $max: $*"
              if sudo apt-get install -y "$@" 2>&1; then
                echo "Installation succeeded"
                return 0
              fi
              attempt=$((attempt+1))
              sleep 10
            done
            echo "WARNING: Could not install some packages after $max attempts. Continuing."
            return 0
          }

          sudo apt-get update -y || true
          retry_apt curl wget unzip zip python3-pip imagemagick fontconfig
          python3 -m pip install --upgrade pip --quiet
          python3 -m pip install pillow --quiet
          python3 -m pip install requests --quiet

          echo "Java version:"
          java -version
          echo "Node version:"
          node --version
          echo "npm version:"
          npm --version
          echo "Python version:"
          python3 --version

      # -------------------------------------------------------------------------
      # STEP 2 - Install Android SDK components
      # -------------------------------------------------------------------------

      - name: Verify and setup Android SDK
        run: |
          echo "==================================================================="
          echo "Verifying Android SDK"
          echo "==================================================================="

          echo "ANDROID_HOME: ${ANDROID_HOME}"
          echo "Available build tools:"
          ls "${ANDROID_HOME}/build-tools/" 2>/dev/null || echo "No build-tools found yet"
          echo "Available platforms:"
          ls "${ANDROID_HOME}/platforms/" 2>/dev/null || echo "No platforms found yet"

          # Accept all SDK licenses
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true

          # Install required SDK components
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-${TARGET_SDK:-35}" \
            "build-tools;35.0.0" \
            "extras;android;m2repository" \
            "extras;google;m2repository" 2>/dev/null || echo "WARNING: Some SDK components may not have installed. Continuing."

          echo "SDK setup complete"

      # -------------------------------------------------------------------------
      # STEP 3 - Create Capacitor project
      # -------------------------------------------------------------------------

      - name: Create Capacitor Android project
        run: |
          set -e
          echo "==================================================================="
          echo "Creating Capacitor project for: ${APP_NAME}"
          echo "Website: ${WEBSITE_URL}"
          echo "Package: ${APP_ID}"
          echo "Created by: ${CREATOR} - ${CREATOR_INSTAGRAM}"
          echo "==================================================================="

          mkdir -p app && cd app

          npm init -y

          # npm install with retry logic
          retry_npm() {
            local attempt=1
            local max=4
            while [[ $attempt -le $max ]]; do
              echo "npm install attempt $attempt of $max..."
              if npm install "$@" --legacy-peer-deps --no-audit --no-fund 2>&1; then
                echo "npm install succeeded"
                return 0
              fi
              attempt=$((attempt+1))
              echo "Retrying in 15 seconds..."
              sleep 15
            done
            echo "ERROR: npm install failed after $max attempts"
            exit 1
          }

          retry_npm \
            @capacitor/core@latest \
            @capacitor/cli@latest \
            @capacitor/android@latest \
            @capacitor/status-bar@latest \
            @capacitor/splash-screen@latest \
            @capacitor/app@latest \
            @capacitor/keyboard@latest \
            @capacitor/network@latest

          echo "All npm packages installed successfully"

          # Create www directory and loader page
          mkdir -p www

      # -------------------------------------------------------------------------
      # STEP 4 - Generate loader HTML with full offline support
      # -------------------------------------------------------------------------

      - name: Generate advanced loader and offline pages
        run: |
          set -e
          cd app

          # Determine loading indicator HTML
          SPINNER_HTML=""
          case "${LOADING_STYLE:-spinner}" in
            spinner)
              SPINNER_HTML='<div class="loader-spinner"></div>'
              ;;
            dots)
              SPINNER_HTML='<div class="loader-dots"><span></span><span></span><span></span></div>'
              ;;
            bar)
              SPINNER_HTML='<div class="loader-bar"><div class="loader-bar-inner"></div></div>'
              ;;
            none)
              SPINNER_HTML=''
              ;;
          esac

          # Determine animation class
          ANIM_CLASS="anim-${SPLASH_ANIMATION:-fade}"

          # Safe area padding injection
          SAFE_AREA_CSS=""
          if [[ "${SAFE_AREA:-true}" == "true" ]]; then
            SAFE_AREA_CSS="
              :root {
                --sat: env(safe-area-inset-top, 0px);
                --sar: env(safe-area-inset-right, 0px);
                --sab: env(safe-area-inset-bottom, 0px);
                --sal: env(safe-area-inset-left, 0px);
              }
              body {
                padding-top: env(safe-area-inset-top, 0px);
                padding-right: env(safe-area-inset-right, 0px);
                padding-bottom: env(safe-area-inset-bottom, 0px);
                padding-left: env(safe-area-inset-left, 0px);
              }"
          fi

          # Generate offline fallback content
          OFFLINE_BODY="${OFFLINE_HTML}"
          if [[ -z "${OFFLINE_BODY}" ]]; then
            OFFLINE_BODY="<div class=\"offline-container\">
              <div class=\"offline-icon\">
                <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">
                  <line x1=\"1\" y1=\"1\" x2=\"23\" y2=\"23\"/>
                  <path d=\"M16.72 11.06A10.94 10.94 0 0 1 19 12.55\"/>
                  <path d=\"M5 12.55a10.94 10.94 0 0 1 5.17-2.39\"/>
                  <path d=\"M10.71 5.05A16 16 0 0 1 22.56 9\"/>
                  <path d=\"M1.42 9a15.91 15.91 0 0 1 4.7-2.88\"/>
                  <path d=\"M8.53 16.11a6 6 0 0 1 6.95 0\"/>
                  <circle cx=\"12\" cy=\"20\" r=\"1\"/>
                </svg>
              </div>
              <h2>${OFFLINE_MSG:-No internet connection. Please check your network and try again.}</h2>
              <p>Created by ${CREATOR} - ${CREATOR_INSTAGRAM}</p>
              <button onclick=\"window.location.reload()\">Try Again</button>
            </div>"
          fi

          cat > www/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
            <meta name="theme-color" content="${APP_COLOR}">
            <meta name="mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
            <title>${APP_NAME}</title>
            <style>
              *, *::before, *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                -webkit-tap-highlight-color: transparent;
              }

              ${SAFE_AREA_CSS}

              html, body {
                width: 100%;
                height: 100%;
                background: ${APP_COLOR};
                color: #FFFFFF;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
                overflow: hidden;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
              }

              /* Splash container */
              .splash {
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                background: ${APP_COLOR};
                z-index: 9999;
                transition: opacity ${SPLASH_FADE:-300}ms ease, transform ${SPLASH_FADE:-300}ms ease;
              }

              .splash.hidden {
                opacity: 0;
                pointer-events: none;
              }

              .splash-text {
                font-size: 16px;
                font-weight: 500;
                opacity: 0.85;
                letter-spacing: 0.3px;
              }

              /* Spinner loader */
              .loader-spinner {
                width: 44px;
                height: 44px;
                border: 3px solid rgba(255,255,255,0.2);
                border-top-color: #FFFFFF;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
              }

              /* Dots loader */
              .loader-dots {
                display: flex;
                gap: 8px;
              }
              .loader-dots span {
                width: 10px;
                height: 10px;
                background: rgba(255,255,255,0.8);
                border-radius: 50%;
                animation: bounce 1.4s ease-in-out infinite both;
              }
              .loader-dots span:nth-child(1) { animation-delay: -0.32s; }
              .loader-dots span:nth-child(2) { animation-delay: -0.16s; }

              /* Bar loader */
              .loader-bar {
                width: 180px;
                height: 3px;
                background: rgba(255,255,255,0.2);
                border-radius: 3px;
                overflow: hidden;
              }
              .loader-bar-inner {
                height: 100%;
                background: #FFFFFF;
                border-radius: 3px;
                animation: slide 1.5s ease-in-out infinite;
              }

              @keyframes spin    { to { transform: rotate(360deg); } }
              @keyframes bounce  { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
              @keyframes slide   { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }

              /* Offline page */
              .offline-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 16px;
                padding: 40px 24px;
                text-align: center;
              }

              .offline-icon {
                width: 64px;
                height: 64px;
                opacity: 0.6;
              }

              .offline-icon svg {
                width: 100%;
                height: 100%;
              }

              .offline-container h2 {
                font-size: 18px;
                font-weight: 600;
                line-height: 1.5;
                max-width: 280px;
                opacity: 0.9;
              }

              .offline-container p {
                font-size: 12px;
                opacity: 0.45;
                margin-top: 4px;
              }

              .offline-container button {
                margin-top: 8px;
                padding: 12px 32px;
                background: rgba(255,255,255,0.15);
                color: #FFFFFF;
                border: 1.5px solid rgba(255,255,255,0.3);
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                cursor: pointer;
                backdrop-filter: blur(10px);
                transition: background 0.2s ease;
              }

              .offline-container button:active {
                background: rgba(255,255,255,0.25);
              }

              .offline-page {
                display: none;
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: ${APP_COLOR};
                z-index: 9998;
              }

              .offline-page.visible {
                display: flex;
              }
            </style>
          </head>
          <body>

            <div class="splash" id="splash">
              ${SPINNER_HTML}
              <p class="splash-text">${SPLASH_TEXT}</p>
            </div>

            <div class="offline-page" id="offline-page">
              ${OFFLINE_BODY}
            </div>

            <script>
              // App info
              var APP_INFO = {
                name: "${APP_NAME}",
                version: "${VERSION_NAME}",
                creator: "${CREATOR}",
                instagram: "${CREATOR_INSTAGRAM}",
                website: "${WEBSITE_URL}"
              };

              // PWA detection flag
              if (${PWA_DETECTION:-true}) {
                window.__NATIVE_APP__ = true;
                window.__APP_VERSION__ = "${VERSION_NAME}";
                window.__CREATOR__ = "${CREATOR}";
              }

              var splash = document.getElementById('splash');
              var offlinePage = document.getElementById('offline-page');
              var retryInterval = null;
              var RETRY_SECONDS = parseInt("${OFFLINE_RETRY:-5}");

              function hideSplash() {
                if (splash) {
                  splash.classList.add('hidden');
                  setTimeout(function() {
                    if (splash && splash.parentNode) {
                      splash.parentNode.removeChild(splash);
                    }
                  }, parseInt("${SPLASH_FADE:-300}") + 100);
                }
              }

              function showOffline() {
                if (offlinePage) {
                  offlinePage.classList.add('visible');
                }
                hideSplash();
                if (!retryInterval) {
                  retryInterval = setInterval(function() {
                    if (navigator.onLine) {
                      clearInterval(retryInterval);
                      retryInterval = null;
                      hideOffline();
                      window.location.reload();
                    }
                  }, RETRY_SECONDS * 1000);
                }
              }

              function hideOffline() {
                if (offlinePage) {
                  offlinePage.classList.remove('visible');
                }
              }

              // Network event listeners
              window.addEventListener('online', function() {
                hideOffline();
                window.location.reload();
              });

              window.addEventListener('offline', function() {
                showOffline();
              });

              // Auto-hide splash after duration
              setTimeout(function() {
                if (!navigator.onLine) {
                  showOffline();
                } else {
                  hideSplash();
                }
              }, parseInt("${SPLASH_DURATION:-2000}"));

              // Service worker registration for offline caching
              if (${SERVICE_WORKER:-true} && 'serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(function() {});
              }

              console.log('[${APP_NAME}] App loaded. Created by ${CREATOR} - ${CREATOR_INSTAGRAM}');
            </script>

          </body>
          </html>
          HTMLEOF

          # Generate service worker
          cat > www/sw.js << SWEOF
          // Service Worker for ${APP_NAME}
          // Created by ${CREATOR} - ${CREATOR_INSTAGRAM}
          var CACHE_NAME = '${APP_ID}-v${VERSION_NAME}';
          var OFFLINE_URL = '/offline.html';

          self.addEventListener('install', function(event) {
            event.waitUntil(
              caches.open(CACHE_NAME).then(function(cache) {
                return cache.addAll(['/']);
              }).catch(function() {})
            );
            self.skipWaiting();
          });

          self.addEventListener('activate', function(event) {
            event.waitUntil(
              caches.keys().then(function(keys) {
                return Promise.all(
                  keys.filter(function(k) { return k !== CACHE_NAME; })
                      .map(function(k) { return caches.delete(k); })
                );
              })
            );
            self.clients.claim();
          });

          self.addEventListener('fetch', function(event) {
            if (event.request.mode === 'navigate') {
              event.respondWith(
                fetch(event.request).catch(function() {
                  return caches.match('/') || new Response('Offline');
                })
              );
            }
          });
          SWEOF

          echo "Loader and offline pages generated"

      # -------------------------------------------------------------------------
      # STEP 5 - Capacitor config
      # -------------------------------------------------------------------------

      - name: Generate Capacitor configuration
        run: |
          set -e
          cd app

          # Build allowNavigation array
          NAV_HOSTS="\"${ALLOW_NAVIGATION:-*}\""
          if [[ "${ALLOW_NAVIGATION}" == *","* ]]; then
            NAV_HOSTS=$(echo "${ALLOW_NAVIGATION}" | tr ',' '\n' | awk '{print "\"" $0 "\""}' | paste -sd',' -)
          fi

          # Build server url from website
          WEBSITE_DOMAIN=$(echo "${WEBSITE_URL}" | sed 's|https\?://||' | sed 's|/.*||')

          cat > capacitor.config.json << CAPEOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "url": "${WEBSITE_URL}",
              "cleartext": ${ALLOW_HTTP:-false},
              "allowNavigation": [${NAV_HOSTS}],
              "errorPath": "/offline.html"
            },
            "android": {
              "buildOptions": {
                "keystorePath": "keystore.jks",
                "keystorePassword": "${KEYSTORE_PASS:-android}",
                "keystoreAlias": "${KEY_ALIAS:-release}",
                "keystoreAliasPassword": "${KEY_PASS:-android}",
                "releaseType": "APK"
              },
              "webContentsDebuggingEnabled": false,
              "loggingBehavior": "none",
              "useLegacyBridge": false,
              "appendUserAgent": "${USER_AGENT_SUFFIX}",
              "backgroundColor": "${APP_COLOR}",
              "allowMixedContent": ${MIXED_CONTENT:-false}
            },
            "ios": {
              "scheme": "${APP_NAME}",
              "backgroundColor": "${APP_COLOR}",
              "contentInset": "automatic",
              "scrollEnabled": true,
              "limitsNavigationsToAppBoundDomains": false
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": ${SPLASH_DURATION:-2000},
                "launchAutoHide": true,
                "launchFadeOutDuration": ${SPLASH_FADE:-300},
                "backgroundColor": "${APP_COLOR}",
                "androidSplashResourceName": "splash",
                "androidScaleType": "CENTER_CROP",
                "showSpinner": false,
                "iosSpinnerStyle": "small",
                "spinnerColor": "#FFFFFF",
                "splashFullScreen": true,
                "splashImmersive": true,
                "useDialog": false
              },
              "StatusBar": {
                "style": "${STATUS_BAR_STYLE:-DARK}",
                "backgroundColor": "${STATUS_BAR_COLOR:-#000000}",
                "overlaysWebView": false,
                "animated": true
              },
              "Keyboard": {
                "resize": "body",
                "style": "dark",
                "resizeOnFullScreen": true
              },
              "App": {
                "launchUrl": "${WEBSITE_URL}"
              }
            }
          }
          CAPEOF

          echo "Capacitor config generated"
          cat capacitor.config.json

          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir www 2>&1 || true

          # Add Android platform with retry
          retry_cap() {
            local attempt=1
            local max=3
            while [[ $attempt -le $max ]]; do
              echo "npx cap add android - attempt $attempt of $max"
              if npx cap add android 2>&1; then
                return 0
              fi
              attempt=$((attempt+1))
              sleep 20
            done
            echo "ERROR: cap add android failed after $max attempts"
            exit 1
          }
          retry_cap

          npx cap sync android 2>&1
          echo "Capacitor Android platform added and synced"

      # -------------------------------------------------------------------------
      # STEP 6 - Patch build.gradle for SDK versions, multidex, signing
      # -------------------------------------------------------------------------

      - name: Patch build.gradle with correct SDK and build configuration
        run: |
          set -e
          cd app/android

          echo "==================================================================="
          echo "Patching build.gradle"
          echo "==================================================================="

          APP_GRADLE="app/build.gradle"

          # Backup original
          cp "$APP_GRADLE" "${APP_GRADLE}.bak"

          # Patch SDK versions
          sed -i "s/compileSdkVersion [0-9]*/compileSdkVersion ${COMPILE_SDK:-35}/g" "$APP_GRADLE" || true
          sed -i "s/compileSdk [0-9]*/compileSdk ${COMPILE_SDK:-35}/g" "$APP_GRADLE" || true
          sed -i "s/minSdkVersion [0-9]*/minSdkVersion ${MIN_SDK:-24}/g" "$APP_GRADLE" || true
          sed -i "s/minSdk [0-9]*/minSdk ${MIN_SDK:-24}/g" "$APP_GRADLE" || true
          sed -i "s/targetSdkVersion [0-9]*/targetSdkVersion ${TARGET_SDK:-35}/g" "$APP_GRADLE" || true
          sed -i "s/targetSdk [0-9]*/targetSdk ${TARGET_SDK:-35}/g" "$APP_GRADLE" || true
          sed -i "s/versionCode [0-9]*/versionCode ${VERSION_CODE:-1}/g" "$APP_GRADLE" || true
          sed -i "s/versionName \"[^\"]*\"/versionName \"${VERSION_NAME:-1.0.0}\"/g" "$APP_GRADLE" || true

          # Show current gradle content for debugging
          echo "Current app/build.gradle content:"
          cat "$APP_GRADLE"

          # Check if signingConfigs block exists
          if ! grep -q "signingConfigs" "$APP_GRADLE"; then
            echo "Adding signingConfigs and release build type..."

            # Add full signing and release config
            python3 << 'PYGRADLE'
          import re
          import os

          with open("app/build.gradle", "r") as f:
              content = f.read()

          proguard = os.environ.get("PROGUARD_ENABLED", "true") == "true"
          multidex = os.environ.get("MULTIDEX_ENABLED", "true") == "true"
          resources = os.environ.get("RESOURCE_SHRINKING", "true") == "true"
          abi_raw = os.environ.get("ABI_FILTERS", "armeabi-v7a,arm64-v8a")
          split = os.environ.get("SPLIT_APKS", "false") == "true"
          key_alias = os.environ.get("KEY_ALIAS", "release")
          keystore_pass = os.environ.get("KEYSTORE_PASS", "android")
          key_pass = os.environ.get("KEY_PASS", "android")
          version_name = os.environ.get("VERSION_NAME", "1.0.0")
          version_code = os.environ.get("VERSION_CODE", "1")
          min_sdk = os.environ.get("MIN_SDK", "24")
          target_sdk = os.environ.get("TARGET_SDK", "35")
          compile_sdk = os.environ.get("COMPILE_SDK", "35")
          app_id = os.environ.get("APP_ID", "com.example.app")

          abi_list = [a.strip().strip('"') for a in abi_raw.split(",")]
          abi_str = ', '.join([f'"{a}"' for a in abi_list])

          signing_block = f'''
          signingConfigs {{
              release {{
                  storeFile file("../keystore.jks")
                  storePassword "{keystore_pass}"
                  keyAlias "{key_alias}"
                  keyPassword "{key_pass}"
              }}
          }}
          '''

          multidex_str = "true" if multidex else "false"
          proguard_str = "true" if proguard else "false"
          resources_str = "true" if (proguard and resources) else "false"

          android_block = f'''android {{
              compileSdk {compile_sdk}
              namespace "{app_id}"
              defaultConfig {{
                  applicationId "{app_id}"
                  minSdk {min_sdk}
                  targetSdk {target_sdk}
                  versionCode {version_code}
                  versionName "{version_name}"
                  multiDexEnabled {multidex_str}
                  vectorDrawables.useSupportLibrary = true
                  ndk {{
                      abiFilters {abi_str}
                  }}
              }}
          {signing_block}
              buildTypes {{
                  debug {{
                      debuggable true
                      minifyEnabled false
                      shrinkResources false
                  }}
                  release {{
                      debuggable false
                      minifyEnabled {proguard_str}
                      shrinkResources {resources_str}
                      signingConfig signingConfigs.release
                      proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
                  }}
              }}
              compileOptions {{
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }}
              kotlinOptions {{
                  jvmTarget = "17"
              }}
          '''

          # Handle split APKs
          if split:
              android_block += '''
              splits {
                  abi {
                      enable true
                      reset()
                      include ''' + abi_str + '''
                      universalApk true
                  }
              }
          '''

          android_block += '}\n'

          # Replace existing android block or prepend
          content_new = re.sub(r'android\s*\{.*?\n\}', android_block, content, flags=re.DOTALL)
          if content_new == content:
              # No android block found, append
              content_new = content + "\n" + android_block

          # Add multidex dependency if needed
          if multidex and "multidex" not in content_new.lower():
              content_new = content_new.replace(
                  "dependencies {",
                  'dependencies {\n    implementation "androidx.multidex:multidex:2.0.1"'
              )

          with open("app/build.gradle", "w") as f:
              f.write(content_new)

          print("build.gradle patched successfully")
          PYGRADLE

          fi

          echo "Final app/build.gradle:"
          cat "$APP_GRADLE"

          # Patch root build.gradle to use compatible Gradle plugin
          ROOT_GRADLE="build.gradle"
          if [[ -f "$ROOT_GRADLE" ]]; then
            echo "Root build.gradle:"
            cat "$ROOT_GRADLE"
          fi

          # Patch gradle wrapper to use stable version
          WRAPPER="gradle/wrapper/gradle-wrapper.properties"
          if [[ -f "$WRAPPER" ]]; then
            echo "Current gradle-wrapper.properties:"
            cat "$WRAPPER"
            # Ensure we use a stable Gradle version
            sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.10-bin.zip|g' "$WRAPPER" || true
            echo "Updated gradle-wrapper.properties:"
            cat "$WRAPPER"
          fi

          echo "build.gradle patching complete"

