      - name: Generate ProGuard rules
        run: |
          set -e
          cd app/android

          cat > app/proguard-rules.pro << PROGUARDEOF
          # Ultimate WebView App Builder - ProGuard Rules
          # Created by ${CREATOR} - ${CREATOR_INSTAGRAM}

          # Keep Capacitor bridge classes
          -keep class com.getcapacitor.** { *; }
          -keep interface com.getcapacitor.** { *; }
          -keep class ${APP_ID}.** { *; }

          # Keep WebView JavaScript interface methods
          -keepclassmembers class * {
              @android.webkit.JavascriptInterface <methods>;
          }

          # Keep Android classes
          -keep class android.webkit.** { *; }
          -keep class androidx.webkit.** { *; }

          # Keep Cordova plugin classes (for Capacitor compatibility)
          -keep class org.apache.cordova.** { *; }

          # Prevent crash on reflection
          -keepattributes *Annotation*
          -keepattributes SourceFile,LineNumberTable
          -keepattributes Signature
          -keepattributes Exceptions

          # Remove logging in release
          -assumenosideeffects class android.util.Log {
              public static boolean isLoggable(java.lang.String, int);
              public static int v(...);
              public static int d(...);
          }

          # Kotlin
          -keep class kotlin.** { *; }
          -keep class kotlin.Metadata { *; }
          -dontwarn kotlin.**
          -keepclassmembers class **$WhenMappings { <fields>; }
          -keepclassmembers class kotlin.Metadata { public <methods>; }

          # OkHttp / Retrofit (often pulled in by plugins)
          -dontwarn okhttp3.**
          -dontwarn okio.**
          -dontwarn retrofit2.**

          # Gson
          -keepattributes SerializedName
          -keep class com.google.gson.** { *; }

          # General Android
          -keepclassmembers class * implements android.os.Parcelable {
              public static final android.os.Parcelable\$Creator *;
          }
          -keepclassmembers enum * {
              public static **[] values();
              public static ** valueOf(java.lang.String);
          }
          PROGUARDEOF

          echo "ProGuard rules generated"

      # -------------------------------------------------------------------------
      # STEP 13 - Generate or decode keystore for signing
      # -------------------------------------------------------------------------

      - name: Setup signing keystore
        run: |
          set -e
          cd app/android

          echo "==================================================================="
          echo "Setting up signing keystore"
          echo "==================================================================="

          if [[ -n "${KEYSTORE_B64}" ]]; then
            echo "Decoding provided keystore from base64..."
            echo "${KEYSTORE_B64}" | base64 -d > keystore.jks
            echo "Keystore decoded successfully"
          else
            echo "No keystore provided. Generating a new debug/release keystore..."
            keytool -genkeypair \
              -v \
              -keystore keystore.jks \
              -alias "${KEY_ALIAS:-release}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "${KEYSTORE_PASS:-android}" \
              -keypass "${KEY_PASS:-android}" \
              -dname "CN=${APP_NAME}, OU=${CREATOR}, O=${CREATOR}, L=Unknown, ST=Unknown, C=US" \
              2>&1 || {
                echo "WARNING: keytool failed. Using debug keystore for signing."
                cp "${ANDROID_HOME}/debug.keystore" keystore.jks 2>/dev/null || true
              }
            echo "Keystore generated"
          fi

          ls -la keystore.jks || echo "WARNING: keystore.jks not found"

      # -------------------------------------------------------------------------
      # STEP 14 - Build APK
      # -------------------------------------------------------------------------

      - name: Build debug APK
        if: env.BUILD_TYPE == 'debug' || env.BUILD_TYPE == 'both'
        run: |
          set -e
          cd app/android
          chmod +x gradlew

          echo "==================================================================="
          echo "Building debug APK"
          echo "==================================================================="

          retry_gradle() {
            local attempt=1
            local max=3
            while [[ $attempt -le $max ]]; do
              echo "Gradle assembleDebug - attempt $attempt of $max"
              if ./gradlew assembleDebug \
                --stacktrace \
                --warning-mode all \
                --no-daemon \
                -Pandroid.useAndroidX=true \
                -Pandroid.enableJetifier=true \
                2>&1; then
                echo "Debug APK build succeeded"
                return 0
              fi
              attempt=$((attempt+1))
              if [[ $attempt -le $max ]]; then
                echo "Build failed. Cleaning and retrying in 20 seconds..."
                ./gradlew clean --no-daemon 2>&1 || true
                sleep 20
              fi
            done
            echo "ERROR: Debug APK build failed after $max attempts"
            exit 1
          }

          retry_gradle

          echo "Debug APK output:"
          find . -name "*.apk" -type f | head -20

      - name: Build release APK (signed)
        if: |
          (env.BUILD_TYPE == 'release' || env.BUILD_TYPE == 'both') &&
          (env.ANDROID_OUTPUT == 'apk' || env.ANDROID_OUTPUT == 'both')
        run: |
          set -e
          cd app/android
          chmod +x gradlew

          echo "==================================================================="
          echo "Building release APK"
          echo "==================================================================="

          retry_gradle_release() {
            local attempt=1
            local max=3
            while [[ $attempt -le $max ]]; do
              echo "Gradle assembleRelease - attempt $attempt of $max"
              if ./gradlew assembleRelease \
                --stacktrace \
                --warning-mode all \
                --no-daemon \
                -Pandroid.useAndroidX=true \
                -Pandroid.enableJetifier=true \
                2>&1; then
                echo "Release APK build succeeded"
                return 0
              fi
              attempt=$((attempt+1))
              if [[ $attempt -le $max ]]; then
                echo "Build failed. Cleaning and retrying in 20 seconds..."
                ./gradlew clean --no-daemon 2>&1 || true
                sleep 20
              fi
            done
            echo "ERROR: Release APK build failed after $max attempts"
            exit 1
          }

          retry_gradle_release

          echo "Release APK output:"
          find . -name "*.apk" -type f | head -20

          # Verify signing
          BUILD_TOOLS=$(ls "${ANDROID_HOME}/build-tools/" | sort -rV | head -1)
          APKSIGNER="${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner"
          APK_PATH=$(find . -name "app-release.apk" -type f | head -1)
          if [[ -n "${APK_PATH}" ]] && [[ -x "${APKSIGNER}" ]]; then
            "${APKSIGNER}" verify --verbose "${APK_PATH}" 2>&1 || echo "WARNING: APK verification could not be confirmed"
          fi

      # -------------------------------------------------------------------------
      # STEP 15 - Build AAB
      # -------------------------------------------------------------------------

      - name: Build release AAB (App Bundle)
        if: |
          (env.BUILD_TYPE == 'release' || env.BUILD_TYPE == 'both') &&
          (env.ANDROID_OUTPUT == 'aab' || env.ANDROID_OUTPUT == 'both')
        run: |
          set -e
          cd app/android
          chmod +x gradlew

          echo "==================================================================="
          echo "Building release AAB (Android App Bundle)"
          echo "==================================================================="

          retry_aab() {
            local attempt=1
            local max=3
            while [[ $attempt -le $max ]]; do
              echo "Gradle bundleRelease - attempt $attempt of $max"
              if ./gradlew bundleRelease \
                --stacktrace \
                --warning-mode all \
                --no-daemon \
                -Pandroid.useAndroidX=true \
                -Pandroid.enableJetifier=true \
                2>&1; then
                echo "AAB build succeeded"
                return 0
              fi
              attempt=$((attempt+1))
              if [[ $attempt -le $max ]]; then
                ./gradlew clean --no-daemon 2>&1 || true
                sleep 20
              fi
            done
            echo "ERROR: AAB build failed after $max attempts"
            exit 1
          }

          retry_aab

          echo "AAB output:"
          find . -name "*.aab" -type f | head -20

      # -------------------------------------------------------------------------
      # STEP 16 - APK alignment and optimization
      # -------------------------------------------------------------------------

      - name: Align and verify APK artifacts
        if: always()
        run: |
          set -e
          cd app/android

          echo "==================================================================="
          echo "Aligning APK artifacts"
          echo "==================================================================="

          BUILD_TOOLS=$(ls "${ANDROID_HOME}/build-tools/" 2>/dev/null | sort -rV | head -1)
          ZIPALIGN="${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/zipalign"

          find . -name "*.apk" -type f | while read apk; do
            echo "Processing APK: $apk"
            ALIGNED="${apk%.apk}-aligned.apk"
            if [[ -x "${ZIPALIGN}" ]]; then
              "${ZIPALIGN}" -v 4 "$apk" "$ALIGNED" 2>&1 && {
                mv "$ALIGNED" "$apk"
                echo "APK aligned: $apk"
              } || echo "WARNING: zipalign failed for $apk, using unaligned"
            fi
            SIZE=$(du -sh "$apk" | cut -f1)
            echo "APK size: $SIZE - $apk"
          done

      # -------------------------------------------------------------------------
      # STEP 17 - Generate release notes
      # -------------------------------------------------------------------------

      - name: Generate release notes and build summary
        if: always()
        run: |
          echo "==================================================================="
          echo "Generating release notes"
          echo "==================================================================="

          cat > /tmp/release-notes.md << RELEASEEOF
          # ${APP_NAME} - Release Notes

          **Version:** ${VERSION_NAME} (${VERSION_CODE})
          **Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Created by:** ${CREATOR} | Instagram: ${CREATOR_INSTAGRAM}

          ## App Information

          | Property | Value |
          |----------|-------|
          | App Name | ${APP_NAME} |
          | Package ID | ${APP_ID} |
          | Version | ${VERSION_NAME} (${VERSION_CODE}) |
          | Website | ${WEBSITE_URL} |
          | Min Android | API ${MIN_SDK:-24} |
          | Target Android | API ${TARGET_SDK:-35} |
          | Build Target | ${BUILD_TARGET} |
          | Build Type | ${BUILD_TYPE} |
          | Android Output | ${ANDROID_OUTPUT} |

          ## Features Enabled

          | Feature | Status |
          |---------|--------|
          | Hardware Acceleration | ${HARDWARE_ACCELERATION:-true} |
          | Pull to Refresh | ${PULL_TO_REFRESH:-false} |
          | Zoom Controls | ${ENABLE_ZOOM:-false} |
          | Dark Mode | ${DARK_MODE_SUPPORT:-true} |
          | Fullscreen | ${FULLSCREEN:-false} |
          | Media Autoplay | ${MEDIA_AUTOPLAY:-true} |
          | Service Worker | ${SERVICE_WORKER:-true} |
          | PWA Detection | ${PWA_DETECTION:-true} |
          | Cookie Persistence | ${COOKIE_PERSISTENCE:-true} |
          | DOM Storage | ${DOM_STORAGE:-true} |
          | Adaptive Icons | ${ADAPTIVE_ICON:-true} |
          | Monochrome Icons | ${MONOCHROME_ICON:-true} |
          | ProGuard/R8 | ${PROGUARD_ENABLED:-true} |
          | MultiDex | ${MULTIDEX_ENABLED:-true} |
          | Camera | ${ENABLE_CAMERA:-false} |
          | Microphone | ${ENABLE_MICROPHONE:-false} |
          | Location | ${ENABLE_LOCATION:-false} |
          | File Picker | ${ENABLE_FILE_PICKER:-false} |
          | Downloads | ${ENABLE_DOWNLOADS:-false} |
          | Notifications | ${ENABLE_NOTIFICATIONS:-false} |

          ## Build Environment

          | Tool | Version |
          |------|---------|
          | Java | 21 (Temurin) |
          | Node.js | 22 |
          | Capacitor | Latest |
          | Target SDK | ${TARGET_SDK:-35} (Android 15) |

          ---
          *Built with Ultimate WebView App Builder by ${CREATOR} - ${CREATOR_INSTAGRAM}*
          RELEASEEOF

          echo "Release notes generated:"
          cat /tmp/release-notes.md

          # Also write to GitHub step summary
          cat /tmp/release-notes.md >> "$GITHUB_STEP_SUMMARY"

      # -------------------------------------------------------------------------
      # STEP 18 - Upload artifacts
      # -------------------------------------------------------------------------

      - name: Upload debug APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION_NAME }}-debug-apk
          path: app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload release APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION_NAME }}-release-apk-signed
          path: app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload release AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION_NAME }}-release-aab
          path: app/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload keystore backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION_NAME }}-keystore-backup
          path: app/android/keystore.jks
          if-no-files-found: ignore
          retention-days: 90

      - name: Upload release notes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION_NAME }}-release-notes
          path: /tmp/release-notes.md
          if-no-files-found: ignore
          retention-days: 30

  # ===========================================================================
  # JOB 3 - IOS BUILD
  # ===========================================================================

  ios:
    name: Build iOS Xcode Project
    needs: validate
    if: |
      needs.validate.outputs.valid == 'true' &&
      (github.event.inputs.build_target == 'ios' || github.event.inputs.build_target == 'both')
    runs-on: macos-latest
    timeout-minutes: 60

    steps:

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system tools
        run: |
          echo "==================================================================="
          echo "Setting up iOS build environment"
          echo "==================================================================="

          # Check Xcode
          xcode-select --print-path
          xcodebuild -version
          swift --version || true

          # Check CocoaPods
          pod --version || {
            echo "Installing CocoaPods..."
            sudo gem install cocoapods --no-document 2>&1 || true
          }

          node --version
          npm --version
          echo "Environment ready"

      - name: Install Node packages with retry
        run: |
          set -e
          mkdir -p ios_app && cd ios_app
          npm init -y

          retry_npm() {
            local attempt=1
            local max=4
            while [[ $attempt -le $max ]]; do
              echo "npm install attempt $attempt of $max..."
              if npm install "$@" --legacy-peer-deps --no-audit --no-fund 2>&1; then
                return 0
              fi
              attempt=$((attempt+1))
              sleep 15
            done
            echo "ERROR: npm install failed after $max attempts"
            exit 1
          }

          retry_npm \
            @capacitor/core@latest \
            @capacitor/cli@latest \
            @capacitor/ios@latest \
            @capacitor/status-bar@latest \
            @capacitor/splash-screen@latest \
            @capacitor/app@latest \
            @capacitor/keyboard@latest \
            @capacitor/network@latest

          echo "iOS npm packages installed"

      - name: Generate iOS loader page
        run: |
          set -e
          cd ios_app
          mkdir -p www

          cat > www/index.html << HTMLIOS
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
            <title>${APP_NAME}</title>
            <style>
              *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
              html, body {
                width: 100%; height: 100%;
                background: ${APP_COLOR};
                color: #FFFFFF;
                font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, Arial, sans-serif;
                -webkit-font-smoothing: antialiased;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
              }
              .splash {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 20px;
                padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
                         env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
              }
              .spinner {
                width: 40px; height: 40px;
                border: 3px solid rgba(255,255,255,0.2);
                border-top-color: #FFF;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
              }
              @keyframes spin { to { transform: rotate(360deg); } }
              .text { font-size: 15px; font-weight: 500; opacity: 0.8; }
              .creator { font-size: 11px; opacity: 0.35; margin-top: 4px; }
            </style>
          </head>
          <body>
            <div class="splash">
              <div class="spinner"></div>
              <p class="text">${SPLASH_TEXT}</p>
              <p class="creator">by ${CREATOR} - ${CREATOR_INSTAGRAM}</p>
            </div>
            <script>
              window.__NATIVE_APP__ = true;
              window.__APP_VERSION__ = '${VERSION_NAME}';
              window.__CREATOR__ = '${CREATOR}';
              window.__CREATOR_INSTAGRAM__ = '${CREATOR_INSTAGRAM}';
            </script>
          </body>
          </html>
          HTMLIOS

          echo "iOS loader page generated"

      - name: Generate Capacitor iOS configuration
        run: |
          set -e
          cd ios_app

          # Build allowNavigation JSON array
          NAV_HOSTS="\"${ALLOW_NAVIGATION:-*}\""
          if [[ "${ALLOW_NAVIGATION}" == *","* ]]; then
            NAV_HOSTS=$(echo "${ALLOW_NAVIGATION}" | tr ',' '\n' | awk '{print "\"" $0 "\""}' | paste -sd',' -)
          fi

          cat > capacitor.config.json << CAPIОСEOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "bundledWebRuntime": false,
            "server": {
              "url": "${WEBSITE_URL}",
              "cleartext": ${ALLOW_HTTP:-false},
              "allowNavigation": [${NAV_HOSTS}],
              "errorPath": "/offline.html"
            },
            "ios": {
              "scheme": "${APP_NAME}",
              "backgroundColor": "${APP_COLOR}",
              "contentInset": "automatic",
              "scrollEnabled": true,
              "limitsNavigationsToAppBoundDomains": false,
              "preferredContentMode": "mobile",
              "allowsLinkPreview": false
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": ${SPLASH_DURATION:-2000},
                "launchAutoHide": true,
                "launchFadeOutDuration": ${SPLASH_FADE:-300},
                "backgroundColor": "${APP_COLOR}",
                "showSpinner": false,
                "spinnerColor": "#FFFFFF",
                "splashFullScreen": true,
                "splashImmersive": false,
                "iosSpinnerStyle": "small"
              },
              "StatusBar": {
                "style": "${IOS_STATUS_STYLE:-DARK}",
                "backgroundColor": "${STATUS_BAR_COLOR:-#000000}",
                "overlaysWebView": false,
                "animated": true
              },
              "Keyboard": {
                "resize": "ionic",
                "style": "dark",
                "resizeOnFullScreen": true
              },
              "App": {
                "launchUrl": "${WEBSITE_URL}"
              }
            }
          }
          CAPIОСEOF

          echo "Capacitor config generated"

          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir www 2>&1 || true

          # Add iOS with retry
          for attempt in 1 2 3; do
            echo "cap add ios attempt $attempt of 3..."
            if npx cap add ios 2>&1; then
              break
            fi
            if [[ $attempt -eq 3 ]]; then
              echo "ERROR: cap add ios failed"
              exit 1
            fi
            sleep 20
          done

          npx cap sync ios 2>&1
          echo "iOS platform added and synced"

      - name: Customize Info.plist for iOS
        run: |
          set -e
          cd ios_app

          # Find Info.plist
          INFOPLIST=$(find ios -name "Info.plist" -not -path "*/Pods/*" | head -1)
          if [[ -z "${INFOPLIST}" ]]; then
            echo "WARNING: Info.plist not found"
            exit 0
          fi

          echo "Found Info.plist at: ${INFOPLIST}"

          python3 << 'PLISTPY'
          import os, re

          plist_path = None
          for root, dirs, files in os.walk("ios"):
              dirs[:] = [d for d in dirs if d != "Pods"]
              for f in files:
                  if f == "Info.plist":
                      plist_path = os.path.join(root, f)
                      break
              if plist_path:
                  break

          if not plist_path:
              print("WARNING: Info.plist not found. Skipping.")
              exit(0)

          with open(plist_path, "r", encoding="utf-8") as f:
              content = f.read()

          def add_plist_key(content, key, value_xml):
              if key not in content:
                  marker = "</dict>\n</plist>"
                  insertion = f"\t<key>{key}</key>\n\t{value_xml}\n"
                  content = content.replace(marker, insertion + marker)
              return content

          app_name    = os.environ.get("APP_NAME", "App")
          version     = os.environ.get("VERSION_NAME", "1.0.0")
          build       = os.environ.get("VERSION_CODE", "1")
          orientation = os.environ.get("ORIENTATION", "portrait")
          enable_cam  = os.environ.get("ENABLE_CAMERA", "false") == "true"
          enable_mic  = os.environ.get("ENABLE_MICROPHONE", "false") == "true"
          enable_loc  = os.environ.get("ENABLE_LOCATION", "false") == "true"
          enable_fp   = os.environ.get("ENABLE_FILE_PICKER", "false") == "true"
          ats_allow   = os.environ.get("IOS_ATS_ALLOW_ALL", "false") == "true"
          deployment  = os.environ.get("IOS_DEPLOYMENT", "14.0")
          bg_modes    = os.environ.get("IOS_BG_MODES", "")
          deep_scheme = os.environ.get("DEEP_LINK_SCHEME", "")
          app_id      = os.environ.get("APP_ID", "com.example.app")
          creator     = os.environ.get("CREATOR", "Zygor")
          creator_ig  = os.environ.get("CREATOR_INSTAGRAM", "@zygorlap")

          # Bundle display name
          content = add_plist_key(content, "CFBundleDisplayName", f"<string>{app_name}</string>")
          content = add_plist_key(content, "CFBundleShortVersionString", f"<string>{version}</string>")
          content = add_plist_key(content, "CFBundleVersion", f"<string>{build}</string>")
          content = add_plist_key(content, "MinimumOSVersion", f"<string>{deployment}</string>")
          content = add_plist_key(content, "LSRequiresIPhoneOS", "<true/>")

          # Privacy descriptions (required for App Store review)
          if enable_cam:
              content = add_plist_key(content, "NSCameraUsageDescription",
                  f"<string>{app_name} needs camera access for this feature.</string>")
          if enable_mic:
              content = add_plist_key(content, "NSMicrophoneUsageDescription",
                  f"<string>{app_name} needs microphone access for this feature.</string>")
          if enable_loc:
              content = add_plist_key(content, "NSLocationWhenInUseUsageDescription",
                  f"<string>{app_name} needs location access for this feature.</string>")
              content = add_plist_key(content, "NSLocationAlwaysAndWhenInUseUsageDescription",
                  f"<string>{app_name} needs location access for this feature.</string>")
          if enable_fp:
              content = add_plist_key(content, "NSPhotoLibraryUsageDescription",
                  f"<string>{app_name} needs access to your photo library.</string>")
              content = add_plist_key(content, "NSPhotoLibraryAddUsageDescription",
                  f"<string>{app_name} needs to save photos to your library.</string>")

          # App Transport Security
          if ats_allow:
              ats_xml = """<dict>
          \t\t<key>NSAllowsArbitraryLoads</key>
          \t\t<true/>
          \t</dict>"""
              content = add_plist_key(content, "NSAppTransportSecurity", ats_xml)

          # Background modes
          if bg_modes:
              modes = [m.strip() for m in bg_modes.split(",") if m.strip()]
              if modes:
                  modes_xml = "<array>\n" + "".join(f"\t\t<string>{m}</string>\n" for m in modes) + "\t</array>"
                  content = add_plist_key(content, "UIBackgroundModes", modes_xml)

          # Custom URL scheme for deep linking
          if deep_scheme:
              url_types = f"""<array>
          \t\t<dict>
          \t\t\t<key>CFBundleURLSchemes</key>
          \t\t\t<array>
          \t\t\t\t<string>{deep_scheme}</string>
          \t\t\t</array>
          \t\t\t<key>CFBundleURLName</key>
          \t\t\t<string>{app_id}</string>
          \t\t</dict>
          \t</array>"""
              content = add_plist_key(content, "CFBundleURLTypes", url_types)

          # Disable arbitrary URL schemes in WebView
          content = add_plist_key(content, "WKAppBoundDomains",
              "<array><string>" + os.environ.get("WEBSITE_URL", "").replace("https://","").replace("http://","").split("/")[0] + "</string></array>")

          # Creator metadata
          content = add_plist_key(content, "CreatedBy", f"<string>{creator} - {creator_ig}</string>")

          with open(plist_path, "w", encoding="utf-8") as f:
              f.write(content)

          print(f"Info.plist customized: {plist_path}")
          PLISTPY

          echo "Info.plist customization complete"

      - name: Run CocoaPods install
        run: |
          set -e
          cd ios_app

          PODFILE_DIR=$(find ios -name "Podfile" -not -path "*/Pods/*" | head -1 | xargs dirname)
          if [[ -z "${PODFILE_DIR}" ]]; then
            echo "WARNING: Podfile not found. Skipping CocoaPods."
            exit 0
          fi

          echo "Found Podfile in: ${PODFILE_DIR}"
          cd "${PODFILE_DIR}"

          for attempt in 1 2 3; do
            echo "pod install attempt $attempt of 3..."
            if pod install --repo-update 2>&1; then
              echo "CocoaPods install succeeded"
              break
            fi
            if [[ $attempt -eq 3 ]]; then
              echo "WARNING: CocoaPods install failed after 3 attempts. Packaging project anyway."
            fi
            sleep 20
          done

      - name: Package iOS Xcode project
        run: |
          set -e
          cd ios_app

          echo "==================================================================="
          echo "Packaging iOS Xcode project"
          echo "==================================================================="

          # Create a comprehensive README for the iOS project
          cat > IOS_PROJECT_README.md << IOSREADME
          # ${APP_NAME} - iOS Xcode Project

          Created by ${CREATOR} - Instagram: ${CREATOR_INSTAGRAM}

          ## Project Details

          - App Name: ${APP_NAME}
          - Bundle ID: ${APP_ID}
          - Version: ${VERSION_NAME} (${VERSION_CODE})
          - Website: ${WEBSITE_URL}
          - Minimum iOS: ${IOS_DEPLOYMENT:-14.0}

          ## How to Build

          1. Open the .xcworkspace file in Xcode (NOT the .xcodeproj)
          2. Select your development team in Signing & Capabilities
          3. Choose a real device or simulator
          4. Press Cmd+R to build and run

          ## Requirements

          - Xcode 15 or later
          - macOS 13 or later
          - CocoaPods installed (run pod install if Pods folder is missing)
          - Apple Developer account for device testing or App Store distribution

          ## Notes

          - All links stay inside the app (no browser redirects)
          - Website loads natively using WKWebView
          - Deep links, permissions, and Info.plist are pre-configured
          - For App Store distribution: archive the project from Xcode Product menu

          ---
          Built with Ultimate WebView App Builder
          Created by ${CREATOR} - ${CREATOR_INSTAGRAM}
          IOSREADME

          # Package everything
          zip -r "../ios-xcode-project-${APP_NAME}-${VERSION_NAME}.zip" \
            ios \
            www \
            capacitor.config.json \
            package.json \
            package-lock.json \
            IOS_PROJECT_README.md \
            --exclude "*/node_modules/*" \
            --exclude "*/.git/*" \
            2>&1

          ls -lh "../ios-xcode-project-${APP_NAME}-${VERSION_NAME}.zip"
          echo "iOS project packaged successfully"

      - name: Upload iOS project artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.VERSION_NAME }}-ios-xcode-project
          path: "ios-xcode-project-${{ env.APP_NAME }}-${{ env.VERSION_NAME }}.zip"
          if-no-files-found: error
          retention-days: 90

      - name: Generate iOS build summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << IOSSUM

          ## iOS Build Summary

          | Property | Value |
          |----------|-------|
          | App Name | ${APP_NAME} |
          | Bundle ID | ${APP_ID} |
          | Version | ${VERSION_NAME} |
          | Min iOS | ${IOS_DEPLOYMENT:-14.0} |
          | Status Bar | ${IOS_STATUS_STYLE:-DARK} |

          *Created by ${CREATOR} - ${CREATOR_INSTAGRAM}*
          IOSSUM

  # ===========================================================================
  # JOB 4 - CREATE GITHUB RELEASE
  # ===========================================================================

  release:
    name: Create GitHub Release
    needs:
      - validate
      - android
      - ios
    if: |
      always() &&
      needs.validate.outputs.valid == 'true' &&
      github.event.inputs.create_github_release == 'true' &&
      (needs.android.result == 'success' || needs.ios.result == 'success')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          find release-artifacts -type f | sort

      - name: Generate release tag
        id: tag
        run: |
          TAG="v${VERSION_NAME}-${VERSION_CODE}-$(date -u +%Y%m%d%H%M%S)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ env.APP_NAME }} v${{ env.VERSION_NAME }} (Build ${{ env.VERSION_CODE }})"
          body: |
            # ${{ env.APP_NAME }} - Release v${{ env.VERSION_NAME }}

            **Build:** ${{ env.VERSION_CODE }}
            **Website:** ${{ env.WEBSITE_URL }}
            **Platform:** ${{ env.BUILD_TARGET }}
            **Date:** ${{ github.run_id }}

            ## Artifacts

            - Debug APK: Install directly on Android for testing
            - Release APK: Production-signed APK for sideloading
            - Release AAB: Upload to Google Play Store
            - iOS Project: Open in Xcode for iOS distribution
            - Keystore: Keep this safe for future release signing

            ## Installation

            For Android: Enable "Install from unknown sources" and install the APK.
