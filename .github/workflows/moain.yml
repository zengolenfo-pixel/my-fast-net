              private void configureWebView() {
                  WebView webView = this.bridge.getWebView();
                  if (webView == null) {
                      android.util.Log.e(TAG, "WebView is null, cannot configure");
                      return;
                  }

                  WebSettings settings = webView.getSettings();

                  // Core settings
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(${DOM_STORAGE:-true});
                  settings.setDatabaseEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setGeolocationEnabled(${ENABLE_LOCATION:-false});
                  settings.setMediaPlaybackRequiresUserGesture(!${MEDIA_AUTOPLAY:-true});
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setSupportZoom(${ENABLE_ZOOM:-false});
                  settings.setBuiltInZoomControls(${ENABLE_ZOOM:-false});
                  settings.setDisplayZoomControls(false);
                  settings.setSaveFormData(true);
                  settings.setSavePassword(true);
                  settings.setTextZoom(100);
                  settings.setDefaultTextEncodingName("utf-8");
                  settings.setLoadsImagesAutomatically(true);

                  // Cache mode
                  settings.setCacheMode(${CACHE_CONST});
                  settings.setAppCacheEnabled(true);

                  // Mixed content
                  settings.setMixedContentMode(${MIXED_CONTENT_MODE});

                  // User agent
                  String defaultUA = settings.getUserAgentString();
                  settings.setUserAgentString(defaultUA + " ${USER_AGENT_SUFFIX}");

                  // Rendering performance optimizations
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  webView.setOverScrollMode(WebView.OVER_SCROLL_NEVER);
                  webView.setScrollBarStyle(View.SCROLLBARS_INSIDE_OVERLAY);
                  webView.setScrollbarFadingEnabled(true);
                  webView.setFocusable(true);
                  webView.setFocusableInTouchMode(true);
                  webView.setHorizontalScrollBarEnabled(false);
                  webView.setVerticalScrollBarEnabled(false);

                  // Cookie persistence
                  CookieManager cookieManager = CookieManager.getInstance();
                  cookieManager.setAcceptCookie(true);
                  cookieManager.setAcceptThirdPartyCookies(webView, ${COOKIE_PERSISTENCE:-true});

                  // Service worker support
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N && ${SERVICE_WORKER:-true}) {
                      ServiceWorkerController swController = ServiceWorkerController.getInstance();
                      swController.setServiceWorkerClient(new ServiceWorkerClient() {
                          @Override
                          public WebResourceResponse shouldInterceptRequest(WebResourceRequest request) {
                              return null;
                          }
                      });
                  }

                  // WebViewClient - intercept navigation
                  webView.setWebViewClient(new WebViewClient() {

                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          String url = request.getUrl().toString();
                          String allowNav = "${ALLOW_NAVIGATION:-*}";

                          // Always load the main website domain internally
                          if (url.startsWith("${WEBSITE_URL}")) {
                              return false;
                          }

                          // Allow navigation wildcard
                          if ("*".equals(allowNav)) {
                              return false;
                          }

                          // Check allowed hosts
                          String host = request.getUrl().getHost();
                          if (host != null) {
                              for (String allowed : allowNav.split(",")) {
                                  allowed = allowed.trim();
                                  if (allowed.startsWith("*.")) {
                                      String domain = allowed.substring(2);
                                      if (host.endsWith(domain) || host.equals(domain)) {
                                          return false;
                                      }
                                  } else if (host.equals(allowed)) {
                                      return false;
                                  }
                              }
                          }

                          // Handle external links
                          String externalBehavior = "${EXTERNAL_LINKS:-block}";
                          if ("system_browser".equals(externalBehavior)) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                              } catch (Exception ignored) {}
                              return true;
                          } else if ("in_app_browser".equals(externalBehavior)) {
                              return false; // Load inside WebView
                          }

                          // Default: block
                          return true;
                      }

                      @Override
                      public void onReceivedError(WebView view, WebResourceRequest request,
                                                  WebResourceError error) {
                          if (request.isForMainFrame()) {
                              android.util.Log.e(TAG, "WebView main frame error: " + error.getDescription());
                          }
                      }

                      @Override
                      public void onReceivedSslError(WebView view, SslErrorHandler handler,
                                                     android.net.http.SslError error) {
                          String sslHandling = "${SSL_ERROR_HANDLING:-strict}";
                          if ("permissive".equals(sslHandling)) {
                              android.util.Log.w(TAG, "SSL error ignored (permissive mode): " + error);
                              handler.proceed();
                          } else {
                              android.util.Log.e(TAG, "SSL error rejected (strict mode): " + error);
                              handler.cancel();
                          }
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);

                          // Inject custom CSS
                          String customCss = "${CUSTOM_CSS}".replace("\"", "\\\"").replace("\n", "\\n");
                          if (!customCss.isEmpty()) {
                              String css = "javascript:(function(){" +
                                  "var s=document.createElement('style');" +
                                  "s.type='text/css';" +
                                  "s.appendChild(document.createTextNode('" + customCss + "'));" +
                                  "document.head.appendChild(s);" +
                              "})()";
                              view.evaluateJavascript(css, null);
                          }

                          // Inject custom font
                          String fontUrl = "${CUSTOM_FONT_URL}";
                          if (!fontUrl.isEmpty()) {
                              String fontJs = "javascript:(function(){" +
                                  "var l=document.createElement('link');" +
                                  "l.rel='stylesheet';l.href='" + fontUrl + "';" +
                                  "document.head.appendChild(l);" +
                              "})()";
                              view.evaluateJavascript(fontJs, null);
                          }

                          // Inject custom JavaScript
                          String customJs = "${CUSTOM_JS}";
                          if (!customJs.isEmpty()) {
                              view.evaluateJavascript("javascript:(function(){" + customJs + "})()", null);
                          }

                          // Inject PWA detection flag
                          if (${PWA_DETECTION:-true}) {
                              view.evaluateJavascript(
                                  "javascript:window.__NATIVE_APP__=true;window.__APP_VERSION__='" +
                                  "${VERSION_NAME}';window.__CREATOR__='${CREATOR}';", null);
                          }

                          android.util.Log.d(TAG, "Page loaded: " + url);
                      }
                  });

                  // WebChromeClient - handle permissions, file picker, geolocation
                  webView.setWebChromeClient(new WebChromeClient() {

                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          List<String> grantedResources = new ArrayList<>();
                          for (String resource : request.getResources()) {
                              if (PermissionRequest.RESOURCE_VIDEO_CAPTURE.equals(resource)
                                  && ${ENABLE_CAMERA:-false}) {
                                  grantedResources.add(resource);
                              } else if (PermissionRequest.RESOURCE_AUDIO_CAPTURE.equals(resource)
                                  && ${ENABLE_MICROPHONE:-false}) {
                                  grantedResources.add(resource);
                              } else if (PermissionRequest.RESOURCE_PROTECTED_MEDIA_ID.equals(resource)) {
                                  grantedResources.add(resource);
                              }
                          }
                          if (!grantedResources.isEmpty()) {
                              request.grant(grantedResources.toArray(new String[0]));
                          } else {
                              request.deny();
                          }
                      }

                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin,
                          GeolocationPermissions.Callback callback) {
                          callback.invoke(origin, ${ENABLE_LOCATION:-false}, false);
                      }

                      @Override
                      public boolean onShowFileChooser(WebView webView,
                          ValueCallback<Uri[]> filePathCallback,
                          FileChooserParams fileChooserParams) {
                          if (!${ENABLE_FILE_PICKER:-false}) {
                              filePathCallback.onReceiveValue(null);
                              return true;
                          }
                          fileChooserCallback = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILE_CHOOSER_REQUEST);
                          } catch (Exception e) {
                              fileChooserCallback = null;
                              return false;
                          }
                          return true;
                      }

                      @Override
                      public void onProgressChanged(WebView view, int newProgress) {
                          android.util.Log.v(TAG, "Loading progress: " + newProgress + "%");
                      }
                  });

                  // Download manager
                  if (${ENABLE_DOWNLOADS:-false}) {
                      webView.setDownloadListener(new DownloadListener() {
                          @Override
                          public void onDownloadStart(String url, String userAgent,
                              String contentDisposition, String mimetype, long contentLength) {
                              try {
                                  DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                                  request.setMimeType(mimetype);
                                  request.addRequestHeader("cookie", CookieManager.getInstance().getCookie(url));
                                  request.addRequestHeader("User-Agent", userAgent);
                                  request.setDescription("Downloading file...");
                                  request.setTitle(URLDecoder.decode(url.substring(url.lastIndexOf("/") + 1), "UTF-8"));
                                  request.allowScanningByMediaScanner();
                                  request.setNotificationVisibility(
                                      DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                                  request.setDestinationInExternalPublicDir(
                                      Environment.DIRECTORY_DOWNLOADS, url.substring(url.lastIndexOf("/") + 1));
                                  DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                                  if (dm != null) {
                                      dm.enqueue(request);
                                      Toast.makeText(getApplicationContext(),
                                          "Download started", Toast.LENGTH_SHORT).show();
                                  }
                              } catch (Exception e) {
                                  android.util.Log.e(TAG, "Download error: " + e.getMessage());
                              }
                          }
                      });
                  }

                  // Pull to refresh
                  if (${PULL_TO_REFRESH:-false}) {
                      try {
                          android.widget.SwipeRefreshLayout swipeRefresh =
                              (android.widget.SwipeRefreshLayout) webView.getParent();
                          if (swipeRefresh != null) {
                              swipeRefresh.setEnabled(true);
                              try {
                                  swipeRefresh.setColorSchemeColors(
                                      Color.parseColor("${PTR_COLOR:-#FFFFFF}"));
                              } catch (Exception ignored) {}
                              swipeRefresh.setOnRefreshListener(new android.widget.SwipeRefreshLayout.OnRefreshListener() {
                                  @Override
                                  public void onRefresh() {
                                      webView.reload();
                                      swipeRefresh.setRefreshing(false);
                                  }
                              });
                          }
                      } catch (Exception e) {
                          android.util.Log.w(TAG, "Pull to refresh setup failed: " + e.getMessage());
                      }
                  }
              }

              private void requestRequiredPermissions() {
                  List<String> permissions = new ArrayList<>();

                  if (${ENABLE_LOCATION:-false} &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.ACCESS_FINE_LOCATION)
                          != PackageManager.PERMISSION_GRANTED) {
                      permissions.add(Manifest.permission.ACCESS_FINE_LOCATION);
                      permissions.add(Manifest.permission.ACCESS_COARSE_LOCATION);
                  }

                  if (${ENABLE_CAMERA:-false} &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.CAMERA)
                          != PackageManager.PERMISSION_GRANTED) {
                      permissions.add(Manifest.permission.CAMERA);
                  }

                  if (${ENABLE_MICROPHONE:-false} &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO)
                          != PackageManager.PERMISSION_GRANTED) {
                      permissions.add(Manifest.permission.RECORD_AUDIO);
                  }

                  if (${ENABLE_NOTIFICATIONS:-false} && Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU &&
                      ContextCompat.checkSelfPermission(this, Manifest.permission.POST_NOTIFICATIONS)
                          != PackageManager.PERMISSION_GRANTED) {
                      permissions.add(Manifest.permission.POST_NOTIFICATIONS);
                  }

                  if (!permissions.isEmpty()) {
                      ActivityCompat.requestPermissions(this,
                          permissions.toArray(new String[0]), PERMISSION_REQUEST_CODE);
                  }
              }

              @Override
              public void onRequestPermissionsResult(int requestCode,
                  @NonNull String[] permissions, @NonNull int[] grantResults) {
                  super.onRequestPermissionsResult(requestCode, permissions, grantResults);
                  if (requestCode == PERMISSION_REQUEST_CODE) {
                      for (int i = 0; i < permissions.length; i++) {
                          String result = grantResults[i] == PackageManager.PERMISSION_GRANTED
                              ? "GRANTED" : "DENIED";
                          android.util.Log.i(TAG, "Permission " + permissions[i] + ": " + result);
                      }
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILE_CHOOSER_REQUEST) {
                      if (fileChooserCallback != null) {
                          Uri[] results = null;
                          if (resultCode == RESULT_OK && data != null) {
                              String dataString = data.getDataString();
                              if (dataString != null) {
                                  results = new Uri[]{Uri.parse(dataString)};
                              } else if (data.getClipData() != null) {
                                  int count = data.getClipData().getItemCount();
                                  results = new Uri[count];
                                  for (int i = 0; i < count; i++) {
                                      results[i] = data.getClipData().getItemAt(i).getUri();
                                  }
                              }
                          }
                          fileChooserCallback.onReceiveValue(results);
                          fileChooserCallback = null;
                      }
                  }
                  super.onActivityResult(requestCode, resultCode, data);
              }

              @Override
              public void onBackPressed() {
                  WebView webView = this.bridge.getWebView();
                  if (${DISABLE_BACK_BUTTON:-true} && webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              @Override
              protected void onResume() {
                  super.onResume();
                  // Re-apply fullscreen after resume
                  if (${FULLSCREEN:-false} && Build.VERSION.SDK_INT < Build.VERSION_CODES.R) {
                      int uiOptions = View.SYSTEM_UI_FLAG_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY;
                      getWindow().getDecorView().setSystemUiVisibility(uiOptions);
                  }
              }

              @Override
              protected void onPause() {
                  super.onPause();
                  // Persist cookies on pause
                  if (${COOKIE_PERSISTENCE:-true}) {
                      CookieManager.getInstance().flush();
                  }
              }

              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  android.util.Log.i(TAG, "App destroyed. Created by ${CREATOR} - ${CREATOR_INSTAGRAM}");
              }
          }
          JAVAEOF

          echo "MainActivity generated at: ${MAIN}"

      # -------------------------------------------------------------------------
