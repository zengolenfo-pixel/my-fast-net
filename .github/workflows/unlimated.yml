name: Ultimate-Ubuntu-Exit-Node

on:
  workflow_dispatch:      # Manual Start
  schedule:
    - cron: '0 */5 * * *' # Auto-restarts every 5 hours to simulate "unlimited" uptime

jobs:
  deploy-ubuntu-node:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Maximum time allowed by GitHub (6 hours)

    steps:
      - name: 🟢 STEP 1 - Security & Secret Check
        run: |
          echo "Checking Tailscale Auth Key..."
          if [ -z "${{ secrets.TAILSCALE_AUTH_KEY }}" ]; then
            echo "❌ ERROR: TAILSCALE_AUTH_KEY is missing or empty!"
            echo "Please add it in your GitHub Repo -> Settings -> Secrets and variables -> Actions."
            exit 1
          else
            echo "✅ Secret found! Proceeding..."
          fi

      - name: 🟢 STEP 2 - Linux Kernel & Speed Optimization
        run: |
          echo "Applying BBR and low-latency network tweaks..."
          sudo sysctl -w net.core.rmem_max=67108864
          sudo sysctl -w net.core.wmem_max=67108864
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 67108864'
          sudo sysctl -w net.ipv4.tcp_wmem='4096 65536 67108864'
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr
          
          # CRITICAL FOR EXIT NODES: Tells Linux it is allowed to route traffic
          sudo sysctl -w net.ipv4.ip_forward=1
          sudo sysctl -w net.ipv6.conf.all.forwarding=1
          sudo sysctl -p

      - name: 🟢 STEP 3 - Install Tailscale
        run: |
          echo "Installing Tailscale Engine..."
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: 🟢 STEP 4 - Connect & Advertise Exit Node
        run: |
          echo "Authenticating to Mesh Network..."
          # Connects using your secret and tells Tailscale this is an Exit Node
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=ubuntu-fast-node \
            --advertise-exit-node \
            --accept-routes \
            --reset
          
          echo "========================================================"
          echo "🚀 NODE IS LIVE! IP: $(tailscale ip -4)"
          echo "========================================================"
          echo "1. Go to your Tailscale Admin Dashboard"
          echo "2. Find 'ubuntu-fast-node'"
          echo "3. Click 'Edit route settings' and check 'Use as exit node'"
          echo "========================================================"

      - name: 🟢 STEP 5 - Unlimited Heartbeat Loop
        run: |
          echo "Starting connection heartbeat..."
          # Keeps the server alive and prevents GitHub from killing it for being completely quiet
          count=0
          while true; do
            echo "[$(date)] Node is active and routing traffic. Uptime: $((count * 5)) minutes."
            sleep 300 # Sleep for 5 minutes
            count=$((count + 1))
            
            # Stop just before 6 hours to let the cron job restart it smoothly
            if [ $count -ge 70 ]; then
              echo "Approaching GitHub's 6-hour limit. Shutting down cleanly for scheduled restart."
              break
            fi
          done
