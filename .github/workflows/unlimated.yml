name: TS

on:
  workflow_dispatch:
  schedule:
    - cron: '13 */5 * * *'

jobs:
  exit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - run: |
          R=$(head /dev/urandom | tr -dc a-z0-9 | head -c7)
          sudo sysctl -w net.ipv4.ip_forward=1 net.ipv6.conf.all.forwarding=1
          sudo sysctl -w net.core.rmem_max=2500000 net.core.wmem_max=2500000
          sudo sysctl -w net.ipv4.tcp_rmem='4096 87380 2500000' net.ipv4.tcp_wmem='4096 65536 2500000'
          sudo sysctl -w net.ipv4.tcp_congestion_control=bbr net.core.default_qdisc=fq
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=ep-$R --advertise-exit-node --accept-routes --ephemeral --reset
          sudo tailscale set --advertise-exit-node
          while true; do
            tailscale status || sudo tailscale up --authkey=${{ secrets.TS_KEY }} --hostname=ep-$R --advertise-exit-node --accept-routes --ephemeral --reset
            sudo sysctl -w net.ipv4.tcp_congestion_control=bbr >/dev/null 2>&1
            sleep 240
          done
