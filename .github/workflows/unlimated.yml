name: Ultimate Capacitor Android APK AAB + iOS Project

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "android, ios, or both"
        required: true
        default: "android"
        type: choice
        options: [android, ios, both]
      app_name:
        description: "App display name"
        required: true
        default: "My Website App"
      app_id:
        description: "Package ID like com.yourname.app"
        required: true
        default: "com.example.myapp"
      website_url:
        description: "Website URL loaded inside native WebView"
        required: true
        default: "https://example.com"
      version_name:
        description: "Version name"
        required: true
        default: "1.0.0"
      version_code:
        description: "Android version code"
        required: true
        default: "1"
      android_output:
        description: "Android output"
        required: true
        default: "apk"
        type: choice
        options: [apk, aab, both]
      app_color:
        description: "Main HEX color"
        required: true
        default: "#111827"
      splash_background:
        description: "Splash HEX color"
        required: true
        default: "#111827"
      status_bar_color:
        description: "Android status bar HEX"
        required: true
        default: "#000000"
      navigation_bar_color:
        description: "Android navigation bar HEX"
        required: true
        default: "#000000"
      icon_url:
        description: "Optional direct PNG/JPG icon URL"
        required: false
        default: ""
      splash_text:
        description: "Fallback loading text"
        required: true
        default: "Loading..."
      orientation:
        description: "Android orientation"
        required: true
        default: "portrait"
        type: choice
        options: [portrait, landscape, unspecified]
      fullscreen:
        description: "Fullscreen Android"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      enable_zoom:
        description: "Enable pinch zoom"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      allow_http:
        description: "Allow http instead of https"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      user_agent_suffix:
        description: "Extra WebView User-Agent text"
        required: false
        default: "UltimateCapacitorApp"
      create_release:
        description: "Create GitHub Release"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]
      release_tag:
        description: "Release tag"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  actions: read

env:
  APP_NAME: ${{ github.event.inputs.app_name }}
  APP_ID: ${{ github.event.inputs.app_id }}
  WEBSITE_URL: ${{ github.event.inputs.website_url }}
  VERSION_NAME: ${{ github.event.inputs.version_name }}
  VERSION_CODE: ${{ github.event.inputs.version_code }}
  APP_COLOR: ${{ github.event.inputs.app_color }}
  SPLASH_BACKGROUND: ${{ github.event.inputs.splash_background }}
  STATUS_BAR_COLOR: ${{ github.event.inputs.status_bar_color }}
  NAVIGATION_BAR_COLOR: ${{ github.event.inputs.navigation_bar_color }}
  ICON_URL: ${{ github.event.inputs.icon_url }}
  SPLASH_TEXT: ${{ github.event.inputs.splash_text }}
  ORIENTATION: ${{ github.event.inputs.orientation }}
  FULLSCREEN: ${{ github.event.inputs.fullscreen }}
  ENABLE_ZOOM: ${{ github.event.inputs.enable_zoom }}
  ALLOW_HTTP: ${{ github.event.inputs.allow_http }}
  USER_AGENT_SUFFIX: ${{ github.event.inputs.user_agent_suffix }}

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Validate
        shell: bash
        run: |
          set -e
          echo "APP_NAME=$APP_NAME"
          echo "APP_ID=$APP_ID"
          echo "WEBSITE_URL=$WEBSITE_URL"
          if [[ ! "$APP_ID" =~ ^[a-zA-Z][a-zA-Z0-9_]*(\.[a-zA-Z][a-zA-Z0-9_]*)+$ ]]; then
            echo "Invalid app_id. Use com.yourname.app"
            exit 1
          fi
          if [[ "$ALLOW_HTTP" == "false" && ! "$WEBSITE_URL" =~ ^https:// ]]; then
            echo "Use https:// website or set allow_http true"
            exit 1
          fi

  android:
    name: Build Android APK/AAB
    needs: validate
    if: github.event.inputs.build_target == 'android' || github.event.inputs.build_target == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y curl unzip zip python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install pillow

      - name: Create Capacitor Android app
        shell: bash
        run: |
          set -e
          mkdir app
          cd app
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npm install @capacitor/status-bar@latest @capacitor/splash-screen@latest @capacitor/app@latest @capacitor/keyboard@latest @capacitor/network@latest @capacitor/browser@latest
          mkdir -p www
          cat > www/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
            <meta name="theme-color" content="${APP_COLOR}">
            <title>${APP_NAME}</title>
            <style>
              html,body{margin:0;width:100%;height:100%;background:${SPLASH_BACKGROUND};color:white;font-family:Arial,sans-serif;overflow:hidden}
              .wrap{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px}
              .spinner{width:52px;height:52px;border:5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
              @keyframes spin{to{transform:rotate(360deg)}}
            </style>
          </head>
          <body><div class="wrap"><div class="spinner"></div><strong>${SPLASH_TEXT}</strong></div></body>
          </html>
          EOF
          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir www
          cat > capacitor.config.json <<EOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "url": "${WEBSITE_URL}",
              "cleartext": ${ALLOW_HTTP}
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 1500,
                "launchAutoHide": true,
                "backgroundColor": "${SPLASH_BACKGROUND}",
                "showSpinner": true,
                "spinnerColor": "#ffffff"
              },
              "StatusBar": {
                "style": "DARK",
                "backgroundColor": "${STATUS_BAR_COLOR}",
                "overlaysWebView": false
              },
              "Keyboard": {
                "resize": "body",
                "style": "dark"
              }
            }
          }
          EOF
          npx cap add android
          npx cap sync android

      - name: Customize Android
        shell: bash
        run: |
          set -e
          cd app/android
          MANIFEST="app/src/main/AndroidManifest.xml"
          MAIN="app/src/main/java/$(echo "${APP_ID}" | tr '.' '/')/MainActivity.java"

          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
          if ! grep -q "android.permission.ACCESS_NETWORK_STATE" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$MANIFEST"
          fi
          if [[ "$ALLOW_HTTP" == "true" ]] && ! grep -q "usesCleartextTraffic" "$MANIFEST"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MANIFEST"
          fi
          if [[ "$ORIENTATION" != "unspecified" ]]; then
            sed -i "s|android:name=\".MainActivity\"|android:name=\".MainActivity\" android:screenOrientation=\"${ORIENTATION}\"|g" "$MANIFEST" || true
          fi

          cat > app/src/main/res/values/strings.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${APP_NAME}</string>
              <string name="title_activity_main">${APP_NAME}</string>
              <string name="package_name">${APP_ID}</string>
              <string name="custom_url_scheme">${APP_ID}</string>
          </resources>
          EOF

          cat > app/src/main/res/values/colors.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">${APP_COLOR}</color>
              <color name="colorPrimaryDark">${STATUS_BAR_COLOR}</color>
              <color name="navigationBarColor">${NAVIGATION_BAR_COLOR}</color>
          </resources>
          EOF

          if [[ -f "$MAIN" ]]; then
            cat > "$MAIN" <<EOF
          package ${APP_ID};

          import android.os.Bundle;
          import android.view.View;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  if ("${FULLSCREEN}".equals("true")) {
                      getWindow().getDecorView().setSystemUiVisibility(
                          View.SYSTEM_UI_FLAG_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                          | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN
                          | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                          | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                      );
                  }

                  try {
                      WebView webView = this.bridge.getWebView();
                      WebSettings settings = webView.getSettings();
                      settings.setJavaScriptEnabled(true);
                      settings.setDomStorageEnabled(true);
                      settings.setDatabaseEnabled(true);
                      settings.setMediaPlaybackRequiresUserGesture(false);
                      settings.setLoadWithOverviewMode(true);
                      settings.setUseWideViewPort(true);
                      settings.setBuiltInZoomControls(${ENABLE_ZOOM});
                      settings.setDisplayZoomControls(false);
                      settings.setSupportZoom(${ENABLE_ZOOM});
                      settings.setUserAgentString(settings.getUserAgentString() + " ${USER_AGENT_SUFFIX}");
                  } catch (Exception ignored) {}
              }
          }
          EOF
          fi

      - name: Generate Android icon and splash
        shell: bash
        run: |
          set -e
          cd app/android
          mkdir -p app/src/main/res/mipmap-mdpi app/src/main/res/mipmap-hdpi app/src/main/res/mipmap-xhdpi app/src/main/res/mipmap-xxhdpi app/src/main/res/mipmap-xxxhdpi app/src/main/res/drawable
          if [[ -n "$ICON_URL" ]]; then curl -L "$ICON_URL" -o /tmp/icon_input || true; fi
          python3 - <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          import os, pathlib
          app_color=os.environ.get("APP_COLOR","#111827")
          splash_bg=os.environ.get("SPLASH_BACKGROUND",app_color)
          app_name=os.environ.get("APP_NAME","App")
          icon_url=os.environ.get("ICON_URL","")
          letter=(app_name.strip()[:1] or "A").upper()
          def make_icon(size):
              p=pathlib.Path("/tmp/icon_input")
              if icon_url and p.exists() and p.stat().st_size>0:
                  try:
                      im=Image.open(p).convert("RGBA")
                      im.thumbnail((size,size))
                      canvas=Image.new("RGBA",(size,size),app_color)
                      canvas.alpha_composite(im,((size-im.width)//2,(size-im.height)//2))
                      return canvas
                  except Exception:
                      pass
              im=Image.new("RGBA",(size,size),app_color)
              d=ImageDraw.Draw(im)
              try: font=ImageFont.truetype("DejaVuSans-Bold.ttf",int(size*.56))
              except Exception: font=None
              bbox=d.textbbox((0,0),letter,font=font)
              w,h=bbox[2]-bbox[0],bbox[3]-bbox[1]
              d.text(((size-w)/2,(size-h)/2-size*.04),letter,fill="white",font=font)
              return im
          sizes={"mipmap-mdpi":48,"mipmap-hdpi":72,"mipmap-xhdpi":96,"mipmap-xxhdpi":144,"mipmap-xxxhdpi":192}
          for folder,size in sizes.items():
              img=make_icon(size)
              img.save(f"app/src/main/res/{folder}/ic_launcher.png")
              img.save(f"app/src/main/res/{folder}/ic_launcher_round.png")
          splash=Image.new("RGBA",(1080,1920),splash_bg)
          icon=make_icon(360)
          splash.alpha_composite(icon,((1080-360)//2,(1920-360)//2))
          splash.save("app/src/main/res/drawable/splash.png")
          PY

      - name: Set Android version
        shell: bash
        run: |
          set -e
          cd app/android
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/g" app/build.gradle || true
          sed -i "s/versionName .*/versionName \"${VERSION_NAME}\"/g" app/build.gradle || true

      - name: Build APK
        if: github.event.inputs.android_output == 'apk' || github.event.inputs.android_output == 'both'
        shell: bash
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Build unsigned AAB
        if: github.event.inputs.android_output == 'aab' || github.event.inputs.android_output == 'both'
        shell: bash
        run: |
          cd app/android
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace

      - name: Upload Android APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload Android AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab-unsigned
          path: app/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore

      - name: Upload Android project source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-project-source
          path: app
          if-no-files-found: ignore

  ios:
    name: Build iOS Project Zip
    needs: validate
    if: github.event.inputs.build_target == 'ios' || github.event.inputs.build_target == 'both'
    runs-on: macos-latest
    steps:
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create Capacitor iOS project
        shell: bash
        run: |
          set -e
          mkdir app
          cd app
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/ios@latest
          npm install @capacitor/status-bar@latest @capacitor/splash-screen@latest @capacitor/app@latest @capacitor/keyboard@latest @capacitor/network@latest @capacitor/browser@latest
          mkdir -p www assets
          cat > www/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="theme-color" content="${APP_COLOR}">
            <title>${APP_NAME}</title>
            <style>
              html,body{margin:0;width:100%;height:100%;background:${SPLASH_BACKGROUND};color:white;font-family:Arial;display:flex;align-items:center;justify-content:center}
            </style>
          </head>
          <body><strong>${SPLASH_TEXT}</strong></body>
          </html>
          EOF
          npx cap init "${APP_NAME}" "${APP_ID}" --web-dir www
          cat > capacitor.config.json <<EOF
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "url": "${WEBSITE_URL}",
              "cleartext": ${ALLOW_HTTP}
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 1500,
                "launchAutoHide": true,
                "backgroundColor": "${SPLASH_BACKGROUND}",
                "showSpinner": true,
                "spinnerColor": "#ffffff"
              },
              "StatusBar": {
                "style": "DARK",
                "backgroundColor": "${STATUS_BAR_COLOR}"
              }
            }
          }
          EOF
          npx cap add ios
          npx cap sync ios
          zip -r ios-project-unsigned.zip ios capacitor.config.json package.json package-lock.json www assets

      - name: Upload iOS project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project-unsigned
          path: app/ios-project-unsigned.zip
          if-no-files-found: error

  release:
    name: Optional Release
    needs: [android, ios]
    if: always() && github.event.inputs.create_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
      - name: Zip outputs
        run: zip -r outputs.zip release-files
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.app_name }} ${{ github.event.inputs.release_tag }}
          files: outputs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
